function getTbl(btn) { return btn.closest('.note-table-wrap').querySelector('.note-table'); }
function tblAddRow(btn) {
  const tbl = getTbl(btn), cols = tbl.rows[0]?.cells.length || 3;
  const wrap = tbl.closest('.note-table-wrap');
  const tr = document.createElement('tr');
  for (let c = 0; c < cols; c++) { const td = document.createElement('td'); td.contentEditable = 'true'; tr.appendChild(td); }
  tbl.appendChild(tr);
  attachTableEvents(tbl);
  rebuildRowHandles(wrap);
  autoSave();
}
function tblDelRow(btn) {
  const tbl = getTbl(btn);
  const wrap = tbl.closest('.note-table-wrap');
  if (tbl.rows.length > 1) { tbl.deleteRow(tbl.rows.length - 1); rebuildRowHandles(wrap); autoSave(); }
  else toast('행이 1개라 삭제 불가');
}
function tblAddCol(btn) {
  const tbl = getTbl(btn);
  const wrap = tbl.closest('.note-table-wrap');
  tblSnapshot(wrap);
  Array.from(tbl.rows).forEach((row, i) => {
    const c = i === 0 ? document.createElement('th') : document.createElement('td');
    c.contentEditable = 'true';
    row.appendChild(c);
  });
  // colgroup 동기화
  let colgroup = tbl.querySelector('colgroup');
  const colCnt = tbl.rows[0]?.cells.length || 1;
  if (colgroup) {
    const pct = (100 / colCnt).toFixed(2) + '%';
    colgroup.innerHTML = '';
    for (let i = 0; i < colCnt; i++) {
      const col = document.createElement('col');
      col.style.width = pct;
      colgroup.appendChild(col);
    }
  }
  tbl.querySelectorAll('td,th').forEach(c => c._ev = false);
  attachTableEvents(tbl);
  rebuildColLines(tbl);
  autoSave();
}
function tblDelCol(btn) {
  const tbl = getTbl(btn);
  const wrap = tbl.closest('.note-table-wrap');
  if ((tbl.rows[0]?.cells.length || 0) <= 1) { toast('열이 1개라 삭제 불가'); return; }
  tblSnapshot(wrap);
  Array.from(tbl.rows).forEach(r => { if (r.cells.length > 0) r.deleteCell(r.cells.length - 1); });
  // colgroup 동기화
  let colgroup = tbl.querySelector('colgroup');
  const colCnt = tbl.rows[0]?.cells.length || 1;
  if (colgroup) {
    const pct = (100 / colCnt).toFixed(2) + '%';
    colgroup.innerHTML = '';
    for (let i = 0; i < colCnt; i++) {
      const col = document.createElement('col');
      col.style.width = pct;
      colgroup.appendChild(col);
    }
  }
  rebuildColLines(tbl);
  autoSave();
}
function tblMerge(btn) {
  const wrap = btn.closest('.note-table-wrap');
  const tbl = wrap.querySelector('.note-table');
  const cells = Array.from(wrap.querySelectorAll('.selected-cell'));
  if (cells.length < 2) { toast('Ctrl+클릭으로 셀 2개 이상 선택'); return; }

  // 같은 행끼리만 병합 가능 — 행별로 그룹핑
  const rowMap = new Map();
  cells.forEach(cell => {
    const row = cell.parentElement;
    if (!rowMap.has(row)) rowMap.set(row, []);
    rowMap.get(row).push(cell);
  });

  // 행이 2개 이상이면 경고
  if (rowMap.size > 1) { toast('같은 행의 셀만 병합할 수 있어요'); return; }

  tblSnapshot(wrap);

  rowMap.forEach((rowCells, row) => {
    // 행 내 DOM 순서대로 정렬
    const allCells = Array.from(row.cells);
    rowCells.sort((a, b) => allCells.indexOf(a) - allCells.indexOf(b));

    // 연속한지 확인 (중간에 선택 안 된 셀 없어야 함)
    const indices = rowCells.map(c => allCells.indexOf(c));
    for (let i = 1; i < indices.length; i++) {
      if (indices[i] !== indices[i-1] + 1) { toast('연속된 셀만 병합할 수 있어요'); return; }
    }

    // 합쳐진 총 colSpan 계산
    const totalSpan = rowCells.reduce((sum, c) => sum + (parseInt(c.colSpan) || 1), 0);

    // 내용 합치기
    const combined = rowCells.map(c => c.innerHTML).filter(h => h.trim()).join(' ');
    const first = rowCells[0];
    first.innerHTML = combined || '';
    first.colSpan = totalSpan;
    first.classList.remove('selected-cell');

    // 나머지 셀은 같은 행에서만 제거 (다른 행 건드리지 않음)
    for (let i = 1; i < rowCells.length; i++) {
      if (rowCells[i].parentElement === row) rowCells[i].remove();
    }
  });

  _selCells = [];

  // colgroup은 실제 1행 기준으로 재계산
  const colgroup = tbl.querySelector('colgroup');
  if (colgroup) {
    const remaining = Array.from(tbl.rows[0]?.cells || []).reduce((s, c) => s + (parseInt(c.colSpan)||1), 0);
    // colgroup col 수를 실제 논리 열 수에 맞춤
    const logicalCols = remaining;
    colgroup.innerHTML = '';
    const pct = (100 / logicalCols).toFixed(2) + '%';
    for (let i = 0; i < logicalCols; i++) {
      const c = document.createElement('col'); c.style.width = pct; colgroup.appendChild(c);
    }
  }
  rebuildColLines(tbl);
  autoSave(); toast('병합됐어요!');
}

function tblSplit(btn) {
  const wrap = btn.closest('.note-table-wrap');
  const tbl = wrap.querySelector('.note-table');
  const selected = Array.from(wrap.querySelectorAll('.selected-cell'));
  if (!selected.length) { toast('Ctrl+클릭으로 분할할 셀을 선택하세요'); return; }

  const cell = selected[0];
  const currentSpan = parseInt(cell.colSpan) || 1;

  // 모달로 분할 수 입력받기
  showModal(`
    <h3>📐 셀 분할</h3>
    <p style="font-size:13px;color:var(--subtext);margin-bottom:14px">
      선택한 셀을 몇 개로 나눌까요?<br>
      <span style="color:var(--accent);font-weight:700">현재 colSpan: ${currentSpan}</span>
    </p>
    <label style="font-size:13px;color:var(--subtext)">분할 개수</label>
    <input id="m-split-count" type="number" min="2" max="20" value="${Math.max(2, currentSpan)}"
      style="margin-bottom:14px" />
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="doTblSplit()">분할</button>
    </div>
  `);

  // 분할 실행 함수를 전역에 임시 저장
  window._splitTarget = { wrap, tbl, cell };
}

function doTblSplit() {
  const inp = document.getElementById('m-split-count');
  if (!inp) return;
  const count = parseInt(inp.value);
  if (isNaN(count) || count < 2) { toast('2 이상 입력하세요'); return; }

  const { wrap, tbl, cell } = window._splitTarget || {};
  if (!cell) { closeModal(); return; }

  closeModal();
  tblSnapshot(wrap);

  const row = cell.parentElement;
  const currentSpan = parseInt(cell.colSpan) || 1;

  // 기존 셀의 colSpan을 1로 리셋
  cell.colSpan = 1;
  cell.classList.remove('selected-cell');

  // 추가로 삽입할 셀 수 = count - 1 (기존 셀 포함해서 count개)
  const addCount = count - 1;
  for (let i = 0; i < addCount; i++) {
    const nc = document.createElement(cell.tagName.toLowerCase());
    nc.contentEditable = 'true';
    row.insertBefore(nc, cell.nextSibling);
  }

  _selCells = [];
  window._splitTarget = null;

  // colgroup 재계산 — 1행 기준 논리 열 수
  let colgroup = tbl.querySelector('colgroup');
  if (!colgroup) { colgroup = document.createElement('colgroup'); tbl.prepend(colgroup); }
  const cnt = Array.from(tbl.rows[0]?.cells || []).reduce((s, c) => s + (parseInt(c.colSpan)||1), 0);
  colgroup.innerHTML = '';
  const pct = (100 / cnt).toFixed(2) + '%';
  for (let i = 0; i < cnt; i++) { const c = document.createElement('col'); c.style.width = pct; colgroup.appendChild(c); }

  tbl.querySelectorAll('td,th').forEach(c => c._ev = false);
  attachTableEvents(tbl);
  rebuildColLines(tbl);
  autoSave(); toast(`${count}개로 분할됐어요!`);
}

function tblEqualRows(btn) {
  const wrap = btn.closest('.note-table-wrap');
  const tbl = wrap.querySelector('.note-table');
  if (!tbl) return;
  tblSnapshot(wrap);

  const selInTable = _selCells.filter(c => wrap.contains(c));
  let targetRows;
  if (selInTable.length > 0) {
    const rowIdxSet = new Set(selInTable.map(c => c.parentElement.rowIndex));
    targetRows = Array.from(tbl.rows).filter((_, i) => rowIdxSet.has(i));
    toast(rowIdxSet.size + '개 행 높이 균등 적용');
  } else {
    targetRows = Array.from(tbl.rows);
    toast('전체 행 높이 균등 적용');
  }
  if (!targetRows.length) return;

  // 1) 기존 고정 높이 제거 → 자연 높이로 리셋
  targetRows.forEach(row => Array.from(row.cells).forEach(cell => {
    cell.style.height = '';
    cell.style.minHeight = '';
  }));

  // 2) 레이아웃 강제 flush 후 각 행 자연 높이 개별 측정
  void tbl.getBoundingClientRect();
  const heights = targetRows.map(row => {
    // 행 안 모든 셀의 scrollHeight 중 최대값을 그 행의 실제 필요 높이로 사용
    return Math.max(...Array.from(row.cells).map(c => c.scrollHeight || c.offsetHeight || 28));
  });
  const maxH = Math.max(...heights);

  // 3) 균등 높이 적용
  targetRows.forEach(row => Array.from(row.cells).forEach(cell => {
    cell.style.height = maxH + 'px';
    cell.style.minHeight = maxH + 'px';
  }));

  rebuildRowHandles(wrap);
  autoSave();
}

function tblEqualCols(btn) {
  const wrap = btn.closest('.note-table-wrap');
  const tbl = wrap.querySelector('.note-table');
  if (!tbl) return;
  tblSnapshot(wrap);

  const selInTable = _selCells.filter(c => wrap.contains(c));
  let targetColIdxs;
  if (selInTable.length > 0) {
    targetColIdxs = [...new Set(selInTable.map(c => c.cellIndex))].sort((a,b)=>a-b);
    toast(targetColIdxs.length + '개 열 너비 균등 적용');
  } else {
    const colCnt = tbl.rows[0]?.cells.length || 1;
    targetColIdxs = Array.from({length: colCnt}, (_, i) => i);
    toast('전체 열 너비 균등 적용');
  }
  if (!targetColIdxs.length) return;

  let colgroup = tbl.querySelector('colgroup');
  if (!colgroup) {
    colgroup = document.createElement('colgroup');
    const cnt = tbl.rows[0]?.cells.length || 1;
    for (let i = 0; i < cnt; i++) {
      const col = document.createElement('col'); colgroup.appendChild(col);
    }
    tbl.prepend(colgroup);
  }
  const cols = Array.from(colgroup.querySelectorAll('col'));
  const totalCols = cols.length;
  if (!totalCols) return;

  // 현재 각 열 너비 비율 파악
  const wrapW = wrap.getBoundingClientRect().width || tbl.offsetWidth || 600;
  const currentWidths = cols.map(col => {
    const w = col.style.width;
    if (w.endsWith('%')) return parseFloat(w);
    return (tbl.rows[0]?.cells[cols.indexOf(col)]?.offsetWidth / wrapW * 100) || (100 / totalCols);
  });

  // 선택 열들의 총 비율을 균등 분배
  const totalPct = targetColIdxs.reduce((s, i) => s + (currentWidths[i] || 100/totalCols), 0);
  const equalPct = (totalPct / targetColIdxs.length).toFixed(2);

  targetColIdxs.forEach(i => {
    if (cols[i]) cols[i].style.width = equalPct + '%';
  });

  rebuildColLines(tbl);
  autoSave();
}

let _lastFocusedCell = null;
let _activeTableWrap = null; // 현재 포커스된 표 wrap

function showTableContextToolbar(wrap) {

// 상단 툴바 표 편집 액션 — 현재 활성 표(wrap)에 위임
function tblCtxAction(action) {

function tblInsertImg(btn) {
  const wrap = btn.closest('.note-table-wrap');
  const cell = (wrap.contains(_lastFocusedCell) ? _lastFocusedCell : null)
    || wrap.querySelector('.selected-cell')
    || wrap.querySelector('td,th');

  const inp = document.createElement('input');

    const file = e.target.files[0]; if (!file) { inp.remove(); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const imgWrap = document.createElement('span');
      imgWrap.style.cssText = 'display:inline-block;position:relative;';
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.style.cssText = 'max-width:100%;border-radius:6px;border:1px solid var(--border);display:block;margin-top:4px';
      const delBtn = document.createElement('button');
      delBtn.textContent = '\u2715';
      delBtn.title = '이미지 삭제';
      delBtn.style.cssText = 'position:absolute;top:6px;right:2px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;opacity:0;transition:opacity 0.15s;';
      delBtn.addEventListener('click', e2 => { e2.preventDefault(); e2.stopPropagation(); imgWrap.remove(); autoSave(); toast('이미지 삭제됐어요'); });
      imgWrap.addEventListener('mouseenter', () => delBtn.style.opacity = '1');
      imgWrap.addEventListener('mouseleave', () => delBtn.style.opacity = '0');
      imgWrap.appendChild(img); imgWrap.appendChild(delBtn);
      cell.appendChild(imgWrap);
      cell.classList.remove('selected-cell');
      _selCells = _selCells.filter(c => c !== cell);
      inp.remove(); autoSave(); toast('이미지 삽입됐어요!');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

//  FORMATTING
// ══════════════════════════════════════════
let _hlRange = null;

// selection을 잃지 않고 서식 적용하는 공통 헬퍼
let _savedRange = null;

// 툴바 mousedown 시 selection 저장 — _selCells도 스냅샷
let _savedSelCells = [];
document.addEventListener('mousedown', e => {
  if (!e.target || !e.target.closest) return;
  const inToolbar = e.target.closest('#editor-toolbar, #editor-topbar');
  if (inToolbar) {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) _savedRange = sel.getRangeAt(0).cloneRange();
    // 이 시점의 _selCells 스냅샷 저장
    _savedSelCells = [..._selCells];
  }
  if (e.target.closest('#highlight-swatches')) {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && !sel.isCollapsed) _hlRange = sel.getRangeAt(0).cloneRange();
    _savedSelCells = [..._selCells];
  }
}, true);

function restoreSelection() {
  if (!_savedRange) return false;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(_savedRange);
  return true;
}

function fmt(cmd) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => {
      cell.focus();
      const r = document.createRange();
      r.selectNodeContents(cell);
      const s = window.getSelection();
      s.removeAllRanges(); s.addRange(r);
      document.execCommand(cmd, false, null);
    });
    autoSave(); return;
  }
  focusAndRestoreSelection() || (() => { const b = getEditorBody(); b.focus(); })();
  document.execCommand(cmd, false, null);
  autoSave();
}

function applyFont(font) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => { cell.style.fontFamily = font; });
    autoSave(); return;
  }
  restoreSelection();
  const sel = window.getSelection();
  let inCell = false;
  if (sel && sel.anchorNode) {
    let node = sel.anchorNode;
    while (node && node !== document.body) {
      if ((node.nodeName === 'TD' || node.nodeName === 'TH') && node.isContentEditable) { node.focus(); inCell = true; break; }
      node = node.parentNode;
    }
  }
  if (!inCell) document.getElementById('editor-body').focus();
  const sel2 = window.getSelection();
  if (!sel2 || sel2.rangeCount === 0 || sel2.isCollapsed) {
    if (!inCell) document.getElementById('editor-body').style.fontFamily = font;
    autoSave(); return;
  }
  const range = sel2.getRangeAt(0);
  try {
    const frag = range.extractContents();
    function stripFont(node) {
      if (node.nodeType === Node.ELEMENT_NODE) {
        if (node.style) node.style.fontFamily = '';
        if (node.getAttribute && node.getAttribute('face')) node.removeAttribute('face');
        Array.from(node.childNodes).forEach(stripFont);
      }
    }
    stripFont(frag);
    const span = document.createElement('span');
    span.style.fontFamily = font;
    span.appendChild(frag);
    range.insertNode(span);
    const nr = document.createRange();
    nr.setStartAfter(span); nr.collapse(true);
    sel2.removeAllRanges(); sel2.addRange(nr);
  } catch(e) {
    document.execCommand('styleWithCSS', false, true);
    document.execCommand('fontName', false, font);
  }
  autoSave();
}

function applyFontSize(size) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => { cell.style.fontSize = size; });
    autoSave(); return;
  }
  restoreSelection();
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    try {
      const frag = range.extractContents();
      function stripSize(node) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.style) node.style.fontSize = '';
          Array.from(node.childNodes).forEach(stripSize);
        }
      }
      stripSize(frag);
      const span = document.createElement('span');
      span.style.fontSize = size;
      span.appendChild(frag);
      range.insertNode(span);
      const nr = document.createRange();
      nr.setStartAfter(span); nr.collapse(true);
      sel.removeAllRanges(); sel.addRange(nr);
    } catch(e) {
      const span = document.createElement('span');
      span.style.fontSize = size;
      try { range.surroundContents(span); } catch(e2) {}
    }
  }
  autoSave();
}

function applyTextColor(color) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => { cell.style.color = color; });
    autoSave(); return;
  }
  restoreSelection();
  const sel = window.getSelection();
  if (sel && sel.anchorNode) {
    let node = sel.anchorNode;
    while (node && node !== document.body) {
      if ((node.nodeName === 'TD' || node.nodeName === 'TH') && node.isContentEditable) { node.focus(); break; }
      node = node.parentNode;
    }
  }
  document.execCommand('styleWithCSS', false, true);
  document.execCommand('foreColor', false, color);
  autoSave();
}
function applyHighlight(color) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => {
      cell.style.backgroundColor = color === 'transparent' ? '' : color;
    });
    autoSave(); return;
  }
  const sel = window.getSelection();
  let range = null;
  if (_hlRange) {
    range = _hlRange; _hlRange = null;
    sel.removeAllRanges(); sel.addRange(range);
    // 셀 안이면 셀 focus
    let node = range.commonAncestorContainer;
    while (node && node !== document.body) {
      if ((node.nodeName === 'TD' || node.nodeName === 'TH') && node.isContentEditable) { node.focus(); break; }
      node = node.parentNode;
    }
  } else if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
    range = sel.getRangeAt(0);
  }
  if (!range || range.collapsed) { toast('텍스트를 먼저 선택하세요'); return; }

  if (color === 'transparent') {
    // 선택 범위 안의 모든 mark/하이라이트 span 제거
    // 1) range를 fragment로 꺼내서 mark 언래핑
    const frag = range.extractContents();
    function unwrapMarks(node) {
      if (node.nodeType === Node.ELEMENT_NODE) {
        if (node.tagName === 'MARK' ||
            (node.tagName === 'SPAN' && node.style.backgroundColor && node.style.backgroundColor !== 'transparent')) {
          // 자식들을 앞에 펼치기
          const parent = node.parentNode;
          while (node.firstChild) parent.insertBefore(node.firstChild, node);
          parent.removeChild(node);
          return;
        }
        // 자식 순회 (복사본 사용, 중간에 바뀌므로)
        Array.from(node.childNodes).forEach(unwrapMarks);
      }
    }
    // frag 안에서 unwrap
    const tmpDiv = document.createElement('div');
    tmpDiv.appendChild(frag);
    Array.from(tmpDiv.childNodes).forEach(unwrapMarks);
    // 다시 삽입
    range.insertNode(tmpDiv);
    // tmpDiv 언래핑
    const parent = tmpDiv.parentNode;
    while (tmpDiv.firstChild) parent.insertBefore(tmpDiv.firstChild, tmpDiv);
    parent.removeChild(tmpDiv);
  } else {
    // 형광펜 적용
    try {
      const frag = range.extractContents();
      // 기존 mark 제거 후 새 mark로 감싸기
      function flattenMarks(node) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.tagName === 'MARK') {
            const span = document.createElement('span');
            while (node.firstChild) span.appendChild(node.firstChild);
            node.parentNode.replaceChild(span, node);
            return;
          }
          Array.from(node.childNodes).forEach(flattenMarks);
        }
      }
      flattenMarks(frag);
      const mark = document.createElement('mark');
      mark.style.backgroundColor = color;
      mark.style.color = 'inherit';
      mark.style.borderRadius = '2px';
      mark.appendChild(frag);
      range.insertNode(mark);
      sel.removeAllRanges();
    } catch(e) {
      document.execCommand('hiliteColor', false, color);
    }
  }
  autoSave();
}

// 정렬 — 표 셀 or 일반 블록
function applyAlign(dir) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => { cell.style.textAlign = dir; });
    ['l','c','r','j'].forEach(k=>{ const b=document.getElementById('aln-'+k); if(b) b.classList.remove('active'); });
    const km={left:'l',center:'c',right:'r',justify:'j'};
    const btn=document.getElementById('aln-'+km[dir]); if(btn) btn.classList.add('active');
    autoSave(); return;
  }
  // savedRange에서 셀 찾기
  const body = getEditorBody();
  let cellTarget = null;
  if (_savedRange) {
    let node = _savedRange.commonAncestorContainer;
    while (node && node !== document.body) {
      if (node.nodeName === 'TD' || node.nodeName === 'TH') { cellTarget = node; break; }
      node = node.parentNode;
    }
  }
  if (!cellTarget) {
    // 현재 selection에서도 찾기
    const sel = window.getSelection();
    if (sel && sel.anchorNode) {
      let node = sel.anchorNode;
      while (node && node !== document.body) {
        if (node.nodeName === 'TD' || node.nodeName === 'TH') { cellTarget = node; break; }
        node = node.parentNode;
      }
    }
  }
  if (cellTarget) {
    cellTarget.style.textAlign = dir;
  } else {
    restoreSelection();
    body.focus();
    const cmds = {left:'justifyLeft',center:'justifyCenter',right:'justifyRight',justify:'justifyFull'};
    document.execCommand(cmds[dir], false, null);
  }
  ['l','c','r','j'].forEach(k=>{ const b=document.getElementById('aln-'+k); if(b) b.classList.remove('active'); });
  const km = {left:'l',center:'c',right:'r',justify:'j'};
  const btn = document.getElementById('aln-'+km[dir]);
  if (btn) btn.classList.add('active');
  autoSave();
}

function buildExamParts(title, html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  // UI 요소 제거
  tmp.querySelectorAll('.table-toolbar, .col-resize-overlay, .tbl-resize-handle, .tbl-row-resize-handle').forEach(el => el.remove());
  tmp.querySelectorAll('.note-table-wrap').forEach(w => w.removeAttribute('contenteditable'));
  // 표 셀 contenteditable 유지하되 선택 표시 제거
  tmp.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));

  const answers = [];
  let idx = 0;

  function procNode(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      if (node.textContent.includes('`')) {
        const span = document.createElement('span');
        span.innerHTML = node.textContent.replace(/`([^`]+)`/g, (_, inner) => {
          idx++;
          answers.push({ num: idx, answer: inner });
          return `<span style="display:inline-block;border-bottom:2px solid #333;min-width:${Math.max(50, inner.length * 10)}px;margin:0 2px;position:relative"><sup style="font-size:9px;color:#999;position:absolute;top:0;left:1px">${idx}</sup></span>`;
        });
        node.replaceWith(span);
      }
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      // 표 셀(td, th) 처리 — innerHTML에서 텍스트 직접 추출
      if (node.nodeName === 'TD' || node.nodeName === 'TH') {
        // 셀 안의 텍스트 노드들을 재귀 처리
        Array.from(node.childNodes).forEach(procNode);
        return;
      }
      Array.from(node.childNodes).forEach(procNode);
    }
  }

  procNode(tmp);

  const examHTML = `<div style="max-width:800px;margin:0 auto;padding:40px;font-family:'Nanum Myeongjo',serif;line-height:2;">
    <div style="text-align:center;margin-bottom:28px;border-bottom:3px double #000;padding-bottom:14px;">
      <h1 style="font-size:22px;margin-bottom:4px">${title || '시험지'}</h1>
      <p style="font-size:13px;color:#666">이름: ___________________ &nbsp; 날짜: ${new Date().toLocaleDateString('ko-KR')} &nbsp; 점수: _______</p>
    </div>${tmp.innerHTML}
    <div style="margin-top:36px;border-top:2px solid #000;padding-top:12px;font-size:12px;color:#666">※ 빈칸에 알맞은 내용을 채워넣으시오.</div></div>`;

  return { examHTML, answers };
}

function buildAnswerSheet(title, answers) {
  if (!answers.length) return null;
  return `<div style="max-width:800px;margin:0 auto;padding:40px;font-family:'Nanum Myeongjo',serif;line-height:1.8;">
    <div style="text-align:center;margin-bottom:22px;border-bottom:3px double #000;padding-bottom:12px;">
      <h1 style="font-size:20px;margin-bottom:4px">📋 ${title||'시험지'} — 정답</h1>
      <p style="font-size:12px;color:#888">${new Date().toLocaleDateString('ko-KR')}</p>
    </div>
    <table style="border-collapse:collapse;width:100%;font-size:13.5px">
      <thead><tr style="background:#f5f5f5"><th style="padding:6px 14px;border:1px solid #ddd;width:50px">번호</th><th style="padding:6px 14px;border:1px solid #ddd;text-align:left">정답</th></tr></thead>
      <tbody>${answers.map(a=>`<tr><td style="padding:5px 14px;border:1px solid #ddd;text-align:center;font-weight:700;color:#555">${a.num}</td><td style="padding:5px 14px;border:1px solid #ddd">${a.answer}</td></tr>`).join('')}</tbody>
    </table></div>`;
}

function makeExam() {
  const note=state.notes.find(n=>n.id===state.currentNoteId); if(!note) return;
  const html=document.getElementById('editor-body').innerHTML;
  const {examHTML,answers}=buildExamParts(note.title,html);
  const ansHTML=buildAnswerSheet(note.title,answers);
  saveExamAsPDF(ansHTML?[examHTML,ansHTML]:[examHTML], note.title||'시험지');
}
function makeSubjectExam() {
  const subId=state.filterSubject; if(subId==='all'){toast('과목을 선택하세요');return;}
  const sub=state.subjects.find(s=>s.id===subId);
  const notes=state.notes.filter(n=>n.subject===subId);
  if(!notes.length){toast('이 과목에 노트가 없어요');return;}
  const exams=[],answerPages=[];
  notes.forEach(note=>{
    const {examHTML,answers}=buildExamParts(note.title,note.html||'');
    exams.push(examHTML);
    const a=buildAnswerSheet(note.title,answers); if(a) answerPages.push(a);
  });
  saveExamAsPDF([...exams,...answerPages],(sub?.name||'과목')+'_시험지');
}

// 시험지 HTML을 A4 크기 페이지 div 배열로 분할 — 잘림 없는 버전
async function splitExamIntoPages(examHTML, containerW) {
  const PAD = 40;
  const PAGE_H_PX = Math.round(containerW * (297 / 210)); // A4 비율
  const contentH = PAGE_H_PX - PAD * 2;

  // 1) 전체 렌더 컨테이너를 DOM에 붙여서 정확한 높이 측정
  const wrap = document.createElement('div');
  wrap.style.cssText = [
    `position:fixed`, `left:-9999px`, `top:0`,
    `width:${containerW}px`, `background:#fff`,
    `padding:${PAD}px`, `box-sizing:border-box`,
    `font-family:'Nanum Myeongjo',serif`, `line-height:2`,
    `visibility:hidden`, `z-index:-1`
  ].join(';');
  wrap.innerHTML = examHTML;
  document.body.appendChild(wrap);

  // 폰트 로드 및 레이아웃 안정화 대기
  await new Promise(r => setTimeout(r, 200));
  // 강제 reflow
  void wrap.getBoundingClientRect();
  await new Promise(r => setTimeout(r, 100));

  // 2) 자식 요소 높이를 DOM에 붙은 상태에서 정확히 측정
  const children = Array.from(wrap.children);
  const childHeights = children.map(child => {
    const rect = child.getBoundingClientRect();
    return Math.ceil(rect.height) || child.offsetHeight || 40;
  });

  document.body.removeChild(wrap);

  // 3) 페이지 배분 — 각 요소가 페이지를 넘으면 단독으로 새 페이지
  const pages = []; // [{nodes: [...clonedNode], totalH}]
  let curNodes = [];
  let curH = 0;

  for (let i = 0; i < children.length; i++) {
    const child = children[i];
    const h = childHeights[i];
    const gap = curH > 0 ? 8 : 0; // 첫 요소 제외 간격

    if (curH > 0 && curH + gap + h > contentH) {
      // 현재 페이지 확정 후 새 페이지
      pages.push({ nodes: curNodes, totalH: curH });
      curNodes = [];
      curH = 0;
    }

    curNodes.push({ node: child.cloneNode(true), h });
    curH += (curH > 0 ? 8 : 0) + h;
  }
  if (curNodes.length > 0) pages.push({ nodes: curNodes, totalH: curH });

  // 4) 각 페이지를 정확히 A4 높이 div로 생성
  const pageDivs = pages.map(({ nodes }) => {
    const div = document.createElement('div');
    div.style.cssText = [
      `width:${containerW}px`,
      `height:${PAGE_H_PX}px`,        // 정확히 A4 높이 고정
      `min-height:${PAGE_H_PX}px`,
      `max-height:${PAGE_H_PX}px`,
      `background:#fff`,
      `padding:${PAD}px`,
      `box-sizing:border-box`,
      `font-family:'Nanum Myeongjo',serif`,
      `line-height:2`,
      `overflow:hidden`                // 넘침 방지
    ].join(';');
    nodes.forEach(({ node }) => div.appendChild(node));
    return div;
  });

  return pageDivs;
}

async function saveExamAsPDF(examHTMLList, filename) {
  const ld = document.getElementById('exam-loading'), msg = document.getElementById('exam-loading-msg');
  ld.classList.add('show');
  try {
    await new Promise(r => setTimeout(r, 50));
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF({orientation:'p', unit:'px', format:'a4'});
    const pW = pdf.internal.pageSize.getWidth();
    const pH = pdf.internal.pageSize.getHeight();
    const CONT_W = 794;
    let firstPage = true;

    const oncloneFix = (doc) => {
      doc.querySelectorAll('td, th').forEach(cell => {
        const bg = cell.style.backgroundColor;
        if (bg && bg !== 'transparent') cell.style.background = bg;
      });
      doc.querySelectorAll('mark').forEach(mark => {
        mark.style.background = mark.style.backgroundColor || '#fff176';
      });
      doc.querySelectorAll(
        '.table-toolbar, .col-resize-overlay, .tbl-resize-handle, .tbl-row-resize-handle, .tbl-btn, .tbl-drag-handle'
      ).forEach(el => el.remove());
      doc.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
    };

    for (let ei = 0; ei < examHTMLList.length; ei++) {
      msg.textContent = `📄 시험지 PDF 생성 중... (${ei+1}/${examHTMLList.length})`;
      const pageDivs = await splitExamIntoPages(examHTMLList[ei], CONT_W);

      for (let pi = 0; pi < pageDivs.length; pi++) {
        msg.textContent = `📄 PDF 생성 중... (${ei+1}/${examHTMLList.length} — 페이지 ${pi+1}/${pageDivs.length})`;
        const pageDiv = pageDivs[pi];

        // DOM에 붙여서 캡처
        pageDiv.style.position = 'fixed';
        pageDiv.style.left = '-9999px';
        pageDiv.style.top = '0';
        pageDiv.style.zIndex = '-1';
        document.body.appendChild(pageDiv);
        await new Promise(r => setTimeout(r, 100));

        const PAGE_H_PX = Math.round(CONT_W * (297 / 210));
        const canvas = await html2canvas(pageDiv, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          width: CONT_W,
          height: PAGE_H_PX,          // 정확히 A4 높이만 캡처
          windowWidth: CONT_W,
          logging: false,
          onclone: oncloneFix
        });
        document.body.removeChild(pageDiv);

        // 슬라이싱 없이 캔버스 전체를 A4 한 페이지에 꽉 채워 삽입
        if (!firstPage) pdf.addPage();
        firstPage = false;
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pW, pH);
      }
    }

    pdf.save(filename.replace(/[\/\\?%*:|"<>]/g, '-') + '.pdf');
    toast('✅ PDF 저장됐어요!');
  } catch(err) { toast('PDF 오류: ' + err.message); console.error(err); }
  ld.classList.remove('show');
}

// html2canvas 캡처 전 clone에서 스타일 강제 적용
function prepareForCapture(sourceEl) {
  const clone = sourceEl.cloneNode(true);
  clone.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;background:#fff;';
  // contenteditable 제거 (html2canvas가 더 안정적으로 렌더)
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  // 셀 backgroundColor → background 속성으로 병기
  clone.querySelectorAll('td, th').forEach(cell => {
    const bg = cell.style.backgroundColor;
    if (bg && bg !== 'transparent' && bg !== '') {
      cell.style.background = bg;
      cell.setAttribute('bgcolor', bg); // 레거시 fallback
    }
  });
  // mark 태그 배경도 강제
  clone.querySelectorAll('mark').forEach(mark => {
    const bg = mark.style.backgroundColor || '#fff176';
    mark.style.background = bg;
    mark.style.webkitPrintColorAdjust = 'exact';
  });
  // selected-cell 하이라이트 제거
  clone.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
  // 툴바/핸들 제거
  clone.querySelectorAll('.table-toolbar, .col-resize-overlay, .tbl-resize-handle').forEach(el => el.remove());
  document.body.appendChild(clone);
  return clone;
}

async function savePDF() {

    const oncloneFix = (doc) => {
      doc.querySelectorAll('td, th').forEach(cell => {
        const bg = cell.style.backgroundColor;

      });
      doc.querySelectorAll('mark').forEach(mark => {
        mark.style.background = mark.style.backgroundColor || '#fff176';

      // 페이지 번호 가상 요소 제거
      doc.querySelectorAll('.editor-page').forEach(p => p.style.setProperty('--page-num', '""'));
    };

    const A4_W = 794;
    const A4_H = 1123;

    for (let i = 0; i < pages.length; i++) {
      msg.textContent = `📄 PDF 생성 중... (${i+1}/${pages.length})`;
      const page = pages[i];

      const clone = page.cloneNode(true);
      clone.style.cssText = [
        'position:fixed', 'left:-9999px', 'top:0',
        `width:${A4_W}px`,
        `height:${A4_H}px`,          // 정확히 A4 높이 고정

      ].join(';');
      document.body.appendChild(clone);
      await new Promise(r => setTimeout(r, 120));

      const canvas = await html2canvas(clone, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        width: A4_W,
        height: A4_H,                // 정확히 A4 높이만 캡처
        windowWidth: A4_W,
        logging: false,
        onclone: oncloneFix
      });
      document.body.removeChild(clone);

      // 슬라이싱 없이 캔버스 전체를 A4 한 페이지에 그대로 삽입
      if (i > 0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pW, pH);
    }

    const title = (document.getElementById('editor-big-title').value || '노트').replace(/[\/\\?%*:|"<>]/g, '-');
    pdf.save(title + '.pdf');
    toast('✅ PDF 저장됐어요!');
  } catch(err) {
    toast('PDF 오류: ' + err.message);
    console.error(err);
  }
  ld.classList.remove('show');
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function showModal(html) { document.getElementById('modal-content').innerHTML=html; document.getElementById('modal-overlay').style.display='flex'; }
function closeModal() { document.getElementById('modal-overlay').style.display='none'; }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function placeCursorAtEnd(el) { try{const r=document.createRange(),s=window.getSelection();r.selectNodeContents(el);r.collapse(false);s.removeAllRanges();s.addRange(r);}catch(e){} }
function placeCursorAtStart(el) { try{const r=document.createRange(),s=window.getSelection();r.setStart(el,0);r.collapse(true);s.removeAllRanges();s.addRange(r);}catch(e){} }
function isCursorAtFirstLine(cell) { const sel=window.getSelection();if(!sel||!sel.rangeCount)return true;const r=sel.getRangeAt(0),cr=cell.getBoundingClientRect(),rr=r.getBoundingClientRect();return rr.height===0||rr.top<=cr.top+6; }
function isCursorAtLastLine(cell) { const sel=window.getSelection();if(!sel||!sel.rangeCount)return true;const r=sel.getRangeAt(0),cr=cell.getBoundingClientRect(),rr=r.getBoundingClientRect();return rr.height===0||rr.bottom>=cr.bottom-6; }
function isCursorAtTextEnd(el) { const sel=window.getSelection();if(!sel||!sel.rangeCount)return false;const r=sel.getRangeAt(0),er=document.createRange();er.selectNodeContents(el);er.collapse(false);return r.compareBoundaryPoints(Range.END_TO_END,er)>=0; }

function buildHighlightSwatches() {
  const row=document.getElementById('highlight-swatches');
  HL_COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-swatch'+(c==='transparent'?' hl-remove':'');
    if(c!=='transparent') d.style.background=c;
    d.title=c==='transparent'?'형광펜 제거':c;
    d.onclick=()=>applyHighlight(c);
    row.appendChild(d);
  });
}

// editor-body input 이벤트 — 자동 저장 + ol/ul 클래스 유지
document.addEventListener('DOMContentLoaded',()=>{
  loadState(); buildHighlightSwatches(); renderSidebar(); renderNotesList();

  // 첫 페이지 body에 input 핸들러 연결
  const firstBody = document.getElementById('editor-body');
  if (firstBody) firstBody.addEventListener('input', onEditorInput);

  // 스크롤 시 현재 페이지 인디케이터 업데이트
  document.getElementById('editor-scroll')?.addEventListener('scroll', () => {
    const pages = document.querySelectorAll('.editor-page');
    const scrollEl = document.getElementById('editor-scroll');
    const scrollMid = scrollEl.scrollTop + scrollEl.clientHeight / 2;
    let activePage = 0;
    pages.forEach((p, i) => { if (p.offsetTop <= scrollMid) activePage = i; });
    updatePageIndicator(activePage);
  });

  // 에디터 body 커서 이동 시 _savedRange 갱신
  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const node = sel.anchorNode;
    if (!node) return;
    const page = node.nodeType === 1 ? node.closest?.('.editor-page') : node.parentElement?.closest?.('.editor-page');
    if (page) { _savedRange = sel.getRangeAt(0).cloneRange(); }
  });

  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const node = sel.anchorNode;
    if (!node) return;
    const page = node.nodeType === 1 ? node.closest?.('.editor-page') : node.parentElement?.closest?.('.editor-page');
    if (page) { _savedRange = sel.getRangeAt(0).cloneRange(); }
  });

  // ── 페이지 간 / 표 앞뒤 화살표 이동 ──────────────
  // Shift+화살표로 표 선택 (커서가 표 바로 옆에 있을 때)
  document.addEventListener('keydown', e => {
    if (!e.shiftKey || e.ctrlKey || e.metaKey) return;
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    const inPage = active.closest('.editor-page');
    if (!inPage) return;
    const inCell = active.nodeName === 'TD' || active.nodeName === 'TH';
    if (inCell) return;

    // 선택된 표가 있으면 Delete/BackSpace처럼 처리하지 않고 선택만 유지
    // 커서 위치 확인
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;

    const body = active;
    const siblings = Array.from(body.children);

    if (e.key === 'ArrowDown') {
      // 커서가 body 맨 끝에 있는지 확인
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        const r = sel2.getRangeAt(0);
        const rects = r.getClientRects();
        const caretBottom = rects.length > 0 ? rects[0].bottom : r.getBoundingClientRect().bottom;
        const bodyBottom = body.getBoundingClientRect().bottom;
        if (caretBottom < bodyBottom - 5) return;
        // 커서가 body 하단 → body 다음 형제에서 표 찾기
        const bodyParent = body.parentElement;
        if (!bodyParent) return;
        const bodySibs = Array.from(bodyParent.children);
        const bi = bodySibs.indexOf(body);
        for (let i = bi + 1; i < bodySibs.length; i++) {
          if (bodySibs[i].classList?.contains('note-table-wrap')) {
            selectTable(bodySibs[i]);
            toast('표 선택됨 — Ctrl+C로 복사, Ctrl+X로 잘라내기');
            return;
          }
        }
      });
    }

    if (e.key === 'ArrowUp') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        const r = sel2.getRangeAt(0);
        const rects = r.getClientRects();
        const caretTop = rects.length > 0 ? rects[0].top : r.getBoundingClientRect().top;
        const bodyTop = body.getBoundingClientRect().top;
        if (caretTop > bodyTop + 5) return;
        // 커서가 body 상단 → body 이전 형제에서 표 찾기
        const bodyParent = body.parentElement;
        if (!bodyParent) return;
        const bodySibs = Array.from(bodyParent.children);
        const bi = bodySibs.indexOf(body);
        for (let i = bi - 1; i >= 0; i--) {
          if (bodySibs[i].classList?.contains('note-table-wrap')) {
            selectTable(bodySibs[i]);
            toast('표 선택됨 — Ctrl+C로 복사, Ctrl+X로 잘라내기');
            return;
          }
        }
      });
    }
  });

  // Delete/BackSpace 키로 선택된 표 삭제
  document.addEventListener('keydown', e => {
    if (e.key !== 'Delete' && e.key !== 'Backspace' && e.key !== 'Escape') return;

    if (e.key === 'Escape') { deselectTable(); return; }

    // 1) 선택된 표가 있으면 바로 삭제
    if (_selectedTableWrap) {
      e.preventDefault();
      const prev = _selectedTableWrap.previousElementSibling;
      const next = _selectedTableWrap.nextElementSibling;
      _selectedTableWrap.remove();
      _selectedTableWrap = null;
      hideTableContextToolbar();
      const target = prev || next;
      if (target && target.isContentEditable) { target.focus(); placeCursorAtEnd(target); }
      autoSave(); toast('표를 삭제했어요');
      return;
    }

    // 2) 커서가 표 경계에 있을 때
    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    if (active.nodeName === 'TD' || active.nodeName === 'TH') return; // 셀 안은 제외
    const inPage = active.closest('.editor-page');
    if (!inPage) return;

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || !sel.isCollapsed) return;

    const range = sel.getRangeAt(0);
    const body = active;

    if (e.key === 'Backspace') {
      // 커서가 현재 블록의 맨 앞인지 확인
      const atStart = isCursorAtStart(range, body);
      if (!atStart) return;
      // body 안 커서 위치의 이전 형제에서 표 찾기
      let node = range.startContainer;
      // 현재 노드의 부모 중 body 직계 자식 찾기
      while (node && node.parentNode !== body) node = node.parentNode;
      const prevSib = node ? node.previousElementSibling : body.lastElementChild;
      if (prevSib && prevSib.classList.contains('note-table-wrap')) {
        e.preventDefault();
        prevSib.remove();
        hideTableContextToolbar();
        autoSave(); toast('표를 삭제했어요');
      }
    }

    if (e.key === 'Delete') {
      // 커서가 현재 블록의 맨 끝인지 확인
      const atEnd = isCursorAtEnd(range, body);
      if (!atEnd) return;
      let node = range.startContainer;
      while (node && node.parentNode !== body) node = node.parentNode;
      const nextSib = node ? node.nextElementSibling : body.firstElementChild;
      if (nextSib && nextSib.classList.contains('note-table-wrap')) {
        e.preventDefault();
        nextSib.remove();
        hideTableContextToolbar();
        autoSave(); toast('표를 삭제했어요');
      }
    }
  });

  function isCursorAtStart(range, body) {
    if (range.startOffset !== 0) return false;
    let node = range.startContainer;
    while (node && node !== body) {
      if (node.previousSibling) return false;
      node = node.parentNode;
    }
    return true;
  }

  function isCursorAtEnd(range, body) {
    let node = range.startContainer;
    if (node.nodeType === Node.TEXT_NODE) {
      if (range.startOffset < node.textContent.length) return false;
    }
    while (node && node !== body) {
      if (node.nextSibling) return false;
      node = node.parentNode;
    }
    return true;
  }

  // 페이지 경계 Delete / Backspace — 다음 페이지 내용을 현재 페이지로 병합
  document.addEventListener('keydown', e => {
    if (e.key !== 'Delete' && e.key !== 'Backspace') return;
    if (e.ctrlKey || e.metaKey) return;

    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    if (active.nodeName === 'TD' || active.nodeName === 'TH') return;
    const inPage = active.closest('.editor-page');
    if (!inPage) return;

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || !sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    const body = active;

    const pages = Array.from(document.querySelectorAll('.editor-page'));
    const curIdx = pages.indexOf(inPage);

    if (e.key === 'Delete' && isCursorAtEnd(range, body)) {
      // 커서가 현재 페이지 body 맨 끝 → 다음 페이지 내용 병합
      if (curIdx >= pages.length - 1) return; // 마지막 페이지면 패스
      const nextPage = pages[curIdx + 1];
      const nextBody = nextPage.querySelector('[contenteditable]');
      if (!nextBody) return;

      // 다음 페이지 내용이 아예 비어있으면 그냥 페이지만 삭제
      const nextEmpty = nextBody.textContent.trim() === '' && nextBody.querySelectorAll('table, img').length === 0;
      if (nextEmpty) {
        e.preventDefault();
        nextPage.remove();
        updatePageNumbers();
        autoSave();
        return;
      }

      e.preventDefault();
      // 커서 위치 기억 (현재 body 끝)
      const insertBefore = null; // body 끝에 추가

      // 다음 페이지의 모든 자식을 현재 body로 이동
      Array.from(nextBody.childNodes).forEach(node => {
        body.appendChild(node.cloneNode(true));
      });

      // 이동된 표 이벤트 재연결
      body.querySelectorAll('.note-table-wrap').forEach(wrap => {
        const tbl = wrap.querySelector('.note-table');
        if (tbl) { tbl.querySelectorAll('td,th').forEach(c=>c._ev=false); attachTableEvents(tbl); }
        wrap.querySelectorAll('.tbl-resize-handle,.tbl-drag-handle').forEach(h=>h.remove());
        addTableResizeHandle(wrap);
        const dh = document.createElement('div');
        dh.className='tbl-drag-handle'; dh.innerHTML='⠿ 표 이동'; dh.contentEditable='false';
        wrap.appendChild(dh); attachTableDragHandle(dh, wrap);
      });

      nextPage.remove();
      updatePageNumbers();

      // 커서를 병합 지점(원래 body 끝이었던 곳)에 유지
      // → 병합 직후 커서는 새로 붙은 내용 첫 노드 앞
      // 이미 body 끝에 포커스가 있으므로 그대로 두면 됨
      body.focus();
      autoSave();
      return;
    }

    if (e.key === 'Backspace' && isCursorAtStart(range, body)) {
      // 커서가 현재 페이지 body 맨 앞 → 이전 페이지로 병합
      if (curIdx === 0) return; // 첫 페이지면 패스
      const prevPage = pages[curIdx - 1];
      const prevBody = prevPage.querySelector('[contenteditable]');
      if (!prevBody) return;

      // 현재 페이지가 비어있으면 그냥 삭제
      const curEmpty = body.textContent.trim() === '' && body.querySelectorAll('table, img').length === 0;
      if (curEmpty) {
        e.preventDefault();
        inPage.remove();
        updatePageNumbers();
        prevBody.focus();
        placeCursorAtEnd(prevBody);
        autoSave();
        return;
      }

      e.preventDefault();
      // 현재 페이지의 모든 자식을 이전 페이지 body 끝에 이동
      Array.from(body.childNodes).forEach(node => {
        prevBody.appendChild(node.cloneNode(true));
      });

      // 이동된 표 이벤트 재연결
      prevBody.querySelectorAll('.note-table-wrap').forEach(wrap => {
        const tbl = wrap.querySelector('.note-table');
        if (tbl) { tbl.querySelectorAll('td,th').forEach(c=>c._ev=false); attachTableEvents(tbl); }
        wrap.querySelectorAll('.tbl-resize-handle,.tbl-drag-handle').forEach(h=>h.remove());
        addTableResizeHandle(wrap);
        const dh = document.createElement('div');
        dh.className='tbl-drag-handle'; dh.innerHTML='⠿ 표 이동'; dh.contentEditable='false';
        wrap.appendChild(dh); attachTableDragHandle(dh, wrap);
      });

      inPage.remove();
      updatePageNumbers();
      prevBody.focus();
      placeCursorAtEnd(prevBody);
      autoSave();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp' && e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    const inPage = active.closest('.editor-page');
    if (!inPage) return;
    const inCell = active.nodeName === 'TD' || active.nodeName === 'TH';
    if (inCell) return; // 표 셀은 표 전용 핸들러가 처리

    const body = active;
    const pages = Array.from(document.querySelectorAll('.editor-page'));
    const curIdx = pages.indexOf(inPage);

    // ↓ : 브라우저 처리 후 커서가 body 밖이면 다음 페이지
    if (e.key === 'ArrowDown') {
      const snapRange = window.getSelection()?.rangeCount > 0 ? window.getSelection().getRangeAt(0).cloneRange() : null;
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        // 커서가 여전히 같은 body 안에 있으면 이동 불필요
        if (body.contains(sel2.anchorNode)) {
          // 추가 체크: 커서 Y가 body 바닥에 있는지
          const r = sel2.getRangeAt(0);
          const rects = r.getClientRects();
          const caretBottom = rects.length > 0 ? rects[0].bottom : r.getBoundingClientRect().bottom;
          const bodyBottom = body.getBoundingClientRect().bottom;
          if (caretBottom < bodyBottom - 5) return; // 아직 중간 → 이동 불필요
        }
        // 커서가 body 밖이거나 body 바닥 → 다음 페이지
        if (curIdx < pages.length - 1) {
          const nextBody = pages[curIdx + 1].querySelector('[contenteditable]');
          if (nextBody) {
            nextBody.focus();
            const r2 = document.createRange();
            r2.setStart(nextBody, 0);
            r2.collapse(true);
            sel2.removeAllRanges(); sel2.addRange(r2);
            pages[curIdx + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
      });
    }

    // ↑ : 브라우저 처리 후 커서가 body 밖이면 이전 페이지
    if (e.key === 'ArrowUp') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        if (body.contains(sel2.anchorNode)) {
          const r = sel2.getRangeAt(0);
          const rects = r.getClientRects();
          const caretTop = rects.length > 0 ? rects[0].top : r.getBoundingClientRect().top;
          const bodyTop = body.getBoundingClientRect().top;
          if (caretTop > bodyTop + 5) return;
        }
        if (curIdx > 0) {
          const prevBody = pages[curIdx - 1].querySelector('[contenteditable]');
          if (prevBody) {
            prevBody.focus();
            placeCursorAtEnd(prevBody);
            pages[curIdx - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
      });
    }

    // → : body 밖으로 나갔고 다음에 표가 있으면 표 첫 셀로
    if (e.key === 'ArrowRight') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        if (body.contains(sel2.anchorNode)) return;
        const siblings = Array.from(body.parentNode?.children || []);
        const bi = siblings.indexOf(body);
        for (let i = bi + 1; i < siblings.length; i++) {
          if (siblings[i].classList?.contains('note-table-wrap')) {
            const firstCell = siblings[i].querySelector('th, td');
            if (firstCell) { firstCell.focus(); placeCursorAtStart(firstCell); }
            return;
          }
        }
      });
    }

    // ← : body 밖으로 나갔고 이전에 표가 있으면 표 마지막 셀로
    if (e.key === 'ArrowLeft') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        if (body.contains(sel2.anchorNode)) return;
        const siblings = Array.from(body.parentNode?.children || []);
        const bi = siblings.indexOf(body);
        for (let i = bi - 1; i >= 0; i--) {
          if (siblings[i].classList?.contains('note-table-wrap')) {
            const cells = siblings[i].querySelectorAll('td, th');
            if (cells.length) { cells[cells.length - 1].focus(); placeCursorAtEnd(cells[cells.length - 1]); }
            return;
          }
        }
      });
    }
  });


  // Ctrl+S 저장, Ctrl+Z undo, Ctrl+Y redo, Shift+8 → ×, Ctrl+Enter → 새 페이지
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveState(); toast('💾 저장됐어요!'); }
    if ((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { if(document.getElementById('editor-view').style.display!=='none') doUndo(); }
    if ((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))) { if(document.getElementById('editor-view').style.display!=='none') doRedo(); }

    // Ctrl+Enter → 현재 페이지 바로 뒤에 새 페이지 추가
    if ((e.ctrlKey||e.metaKey) && e.key==='Enter') {
      const inPage = document.activeElement?.closest('.editor-page');
      if (inPage) {
        e.preventDefault();
        const container = document.getElementById('pages-container');
        const pages = Array.from(container.querySelectorAll('.editor-page'));
        const curIdx = pages.indexOf(inPage);
        const newPage = document.createElement('div');
        newPage.className = 'editor-page';
        const newBody = makeBodyEl();
        newPage.appendChild(newBody);
        // 현재 페이지 바로 뒤에 삽입
        if (pages[curIdx + 1]) {
          container.insertBefore(newPage, pages[curIdx + 1]);
        } else {
          container.appendChild(newPage);
        }
        updatePageNumbers();
        newBody.focus();
        setTimeout(() => newPage.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        toast('새 페이지 추가됐어요');
      }
    }

    // Shift+8 → · 가운데 점, Ctrl+8 → × 곱하기
    const active = document.activeElement;
    const inEditor = active && (active.closest('.editor-page') || active.closest('.note-table-wrap'));
    if (inEditor && !e.metaKey) {
      if (e.shiftKey && !e.ctrlKey && e.code==='Digit8') {
        e.preventDefault();
        document.execCommand('insertText', false, '·');
      } else if (e.ctrlKey && !e.shiftKey && e.code==='Digit8') {
        e.preventDefault();
        document.execCommand('insertText', false, '×');
      }
    }
  });

  setInterval(saveState, 30000);
});
