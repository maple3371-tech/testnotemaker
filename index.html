function tblMerge(btn) {
  const wrap = btn.closest('.note-table-wrap');
  const tbl = wrap.querySelector('.note-table');
  const cells = wrap.querySelectorAll('.selected-cell');
  if (cells.length < 2) { toast('Ctrl+클릭으로 셀 2개 이상 선택'); return; }
  tblSnapshot(wrap);
  const combined = Array.from(cells).map(c => c.innerHTML).filter(h => h.trim()).join(' ');
  const first = cells[0];
  first.innerHTML = combined || '';
  first.colSpan = cells.length;
  first.classList.remove('selected-cell');
  for (let i = 1; i < cells.length; i++) cells[i].remove();
  _selCells = [];
  const colgroup = tbl.querySelector('colgroup');
  if (colgroup) {
    const remaining = tbl.rows[0]?.cells.length || 1;
    const pct = (100 / remaining).toFixed(2) + '%';
    while (colgroup.children.length > remaining) colgroup.lastChild.remove();
    while (colgroup.children.length < remaining) { const c = document.createElement('col'); c.style.width = pct; colgroup.appendChild(c); }
    colgroup.querySelectorAll('col').forEach(c => c.style.width = pct);
  }
  rebuildColLines(tbl);
  autoSave(); toast('병합됐어요!');
}

function tblSplit(btn) {
  const wrap = btn.closest('.note-table-wrap');
  const tbl = wrap.querySelector('.note-table');
  const selected = wrap.querySelectorAll('.selected-cell');
  if (!selected.length) { toast('Ctrl+클릭으로 병합된 셀을 선택하세요'); return; }
  let didSplit = false;
  tblSnapshot(wrap);
  selected.forEach(cell => {
    const span = parseInt(cell.colSpan) || 1;
    if (span < 2) return;
    cell.colSpan = 1;
    const row = cell.parentElement;
    for (let i = 1; i < span; i++) {
      const nc = document.createElement('td');
      nc.contentEditable = 'true';
      row.insertBefore(nc, cell.nextSibling);
    }
    cell.classList.remove('selected-cell');
    didSplit = true;
  });
  if (!didSplit) { toast('colSpan 2 이상인 셀을 선택하세요'); return; }
  _selCells = [];
  const firstRow = tbl.rows[0];
  if (firstRow) {
    let colgroup = tbl.querySelector('colgroup');
    if (!colgroup) { colgroup = document.createElement('colgroup'); tbl.prepend(colgroup); }
    const cnt = firstRow.cells.length;
    colgroup.innerHTML = '';
    const pct = (100 / cnt).toFixed(2) + '%';
    for (let i = 0; i < cnt; i++) { const c = document.createElement('col'); c.style.width = pct; colgroup.appendChild(c); }
  }
  tbl.querySelectorAll('td,th').forEach(c => c._ev = false);
  attachTableEvents(tbl);
  autoSave(); toast('분할됐어요!');
}

function applyFont(font) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => { cell.style.fontFamily = font; });
    autoSave(); return;
  }
  focusAndRestoreSelection();
  const sel = window.getSelection();
  let inCell = false;
  if (sel && sel.anchorNode) {
    let node = sel.anchorNode;
    while (node && node !== document.body) {
      if ((node.nodeName === 'TD' || node.nodeName === 'TH') && node.isContentEditable) { node.focus(); inCell = true; break; }
      node = node.parentNode;
    }
  }
  if (!inCell) document.getElementById('editor-body').focus();
  const sel2 = window.getSelection();
  if (!sel2 || sel2.rangeCount === 0 || sel2.isCollapsed) {
    if (!inCell) document.getElementById('editor-body').style.fontFamily = font;
    autoSave(); return;
  }
  const range = sel2.getRangeAt(0);
  try {
    const frag = range.extractContents();
    function stripFont(node) {
      if (node.nodeType === Node.ELEMENT_NODE) {
        if (node.style) node.style.fontFamily = '';
        if (node.getAttribute && node.getAttribute('face')) node.removeAttribute('face');
        Array.from(node.childNodes).forEach(stripFont);
      }
    }
    stripFont(frag);
    const span = document.createElement('span');
    span.style.fontFamily = font;
    span.appendChild(frag);
    range.insertNode(span);
    const nr = document.createRange();
    nr.setStartAfter(span); nr.collapse(true);
    sel2.removeAllRanges(); sel2.addRange(nr);
  } catch(e) {
    document.execCommand('styleWithCSS', false, true);
    document.execCommand('fontName', false, font);
  }
  autoSave();
}

function applyFontSize(size) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => { cell.style.fontSize = size; });
    autoSave(); return;
  }
  focusAndRestoreSelection();
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    try {
      const frag = range.extractContents();
      function stripSize(node) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.style) node.style.fontSize = '';
          Array.from(node.childNodes).forEach(stripSize);
        }
      }
      stripSize(frag);
      const span = document.createElement('span');
      span.style.fontSize = size;
      span.appendChild(frag);
      range.insertNode(span);
      const nr = document.createRange();
      nr.setStartAfter(span); nr.collapse(true);
      sel.removeAllRanges(); sel.addRange(nr);
    } catch(e) {
      const span = document.createElement('span');
      span.style.fontSize = size;
      try { range.surroundContents(span); } catch(e2) {}
    }
  }
  autoSave();
}

function applyHighlight(color) {
  if (_savedSelCells.length > 0) {
    _savedSelCells.forEach(cell => {
      cell.style.backgroundColor = color === 'transparent' ? '' : color;
    });
    autoSave(); return;
  }
  const sel = window.getSelection();
  let range = null;
  if (_hlRange) {
    range = _hlRange; _hlRange = null;
    sel.removeAllRanges(); sel.addRange(range);
    // 셀 안이면 셀 focus
    let node = range.commonAncestorContainer;
    while (node && node !== document.body) {
      if ((node.nodeName === 'TD' || node.nodeName === 'TH') && node.isContentEditable) { node.focus(); break; }
      node = node.parentNode;
    }
  } else if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
    range = sel.getRangeAt(0);
  }
  if (!range || range.collapsed) { toast('텍스트를 먼저 선택하세요'); return; }

  if (color === 'transparent') {
    // 선택 범위 안의 모든 mark/하이라이트 span 제거
    // 1) range를 fragment로 꺼내서 mark 언래핑
    const frag = range.extractContents();
    function unwrapMarks(node) {
      if (node.nodeType === Node.ELEMENT_NODE) {
        if (node.tagName === 'MARK' ||
            (node.tagName === 'SPAN' && node.style.backgroundColor && node.style.backgroundColor !== 'transparent')) {
          // 자식들을 앞에 펼치기
          const parent = node.parentNode;
          while (node.firstChild) parent.insertBefore(node.firstChild, node);
          parent.removeChild(node);
          return;
        }
        // 자식 순회 (복사본 사용, 중간에 바뀌므로)
        Array.from(node.childNodes).forEach(unwrapMarks);
      }
    }
    // frag 안에서 unwrap
    const tmpDiv = document.createElement('div');
    tmpDiv.appendChild(frag);
    Array.from(tmpDiv.childNodes).forEach(unwrapMarks);
    // 다시 삽입
    range.insertNode(tmpDiv);
    // tmpDiv 언래핑
    const parent = tmpDiv.parentNode;
    while (tmpDiv.firstChild) parent.insertBefore(tmpDiv.firstChild, tmpDiv);
    parent.removeChild(tmpDiv);
  } else {
    // 형광펜 적용
    try {
      const frag = range.extractContents();
      // 기존 mark 제거 후 새 mark로 감싸기
      function flattenMarks(node) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.tagName === 'MARK') {
            const span = document.createElement('span');
            while (node.firstChild) span.appendChild(node.firstChild);
            node.parentNode.replaceChild(span, node);
            return;
          }
          Array.from(node.childNodes).forEach(flattenMarks);
        }
      }
      flattenMarks(frag);
      const mark = document.createElement('mark');
      mark.style.backgroundColor = color;
      mark.style.color = 'inherit';
      mark.style.borderRadius = '2px';
      mark.appendChild(frag);
      range.insertNode(mark);
      sel.removeAllRanges();
    } catch(e) {
      document.execCommand('hiliteColor', false, color);
    }
  }
  autoSave();
}

document.addEventListener('DOMContentLoaded',()=>{
  // jsPDF 실제 A4 높이로 CSS 구분선 정확히 맞추기
  try {
    const _p = new window.jspdf.jsPDF({unit:'px', format:'a4'});
    const _pH = _p.internal.pageSize.getHeight(); // ≈1122.52
    const _pW = _p.internal.pageSize.getWidth();  // ≈793.70
    // 캔버스(scale=2, 794px)에서 한 페이지 = pH * (794*2) / pW px
    // 에디터에서 한 페이지 = 그 절반
    const exactPageH = Math.round(_pH * 794 / _pW); // ≈1123
    document.documentElement.style.setProperty('--page-h', exactPageH + 'px');
    // 저장해 두기
    window._PDF_PAGE_H = exactPageH;
    window._PDF_PAGE_W = Math.round(_pW);
  } catch(e) {
    window._PDF_PAGE_H = 1123;
    window._PDF_PAGE_W = 794;
  }

  loadState(); buildHighlightSwatches(); renderSidebar(); renderNotesList();

  // 첫 페이지 body에 input 핸들러 연결
  const firstBody = document.getElementById('editor-body');
  if (firstBody) firstBody.addEventListener('input', onEditorInput);

  // 스크롤 시 현재 페이지 인디케이터 업데이트
  document.getElementById('editor-scroll')?.addEventListener('scroll', () => {
    // single body mode
    const scrollEl = document.getElementById('editor-scroll');
    const scrollMid = scrollEl.scrollTop + scrollEl.clientHeight / 2;
    let activePage = 0;
    pages.forEach((p, i) => { if (p.offsetTop <= scrollMid) activePage = i; });
    updatePageBreakLabels();
  });

  // 에디터 body 커서 이동 시 _savedRange 갱신
  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const node = sel.anchorNode;
    if (!node) return;
    const body = document.getElementById('editor-body');
    if (body && body.contains(node)) { _savedRange = sel.getRangeAt(0).cloneRange(); }
  });

  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const node = sel.anchorNode;
    if (!node) return;
    const body = document.getElementById('editor-body');
    if (body && body.contains(node)) { _savedRange = sel.getRangeAt(0).cloneRange(); }
  });

  // ── 페이지 간 / 표 앞뒤 화살표 이동 ──────────────
  // Shift+화살표로 표 선택 (커서가 표 바로 옆에 있을 때)
  document.addEventListener('keydown', e => {
    if (!e.shiftKey || e.ctrlKey || e.metaKey) return;
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    const inPage = active.closest('.editor-page');
    if (!inPage) return;
    const inCell = active.nodeName === 'TD' || active.nodeName === 'TH';
    if (inCell) return;

    // 선택된 표가 있으면 Delete/BackSpace처럼 처리하지 않고 선택만 유지
    // 커서 위치 확인
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;

    const body = active;
    const siblings = Array.from(body.children);

    if (e.key === 'ArrowDown') {
      // 커서가 body 맨 끝에 있는지 확인
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        const r = sel2.getRangeAt(0);
        const rects = r.getClientRects();
        const caretBottom = rects.length > 0 ? rects[0].bottom : r.getBoundingClientRect().bottom;
        const bodyBottom = body.getBoundingClientRect().bottom;
        if (caretBottom < bodyBottom - 5) return;
        // 커서가 body 하단 → body 다음 형제에서 표 찾기
        const bodyParent = body.parentElement;
        if (!bodyParent) return;
        const bodySibs = Array.from(bodyParent.children);
        const bi = bodySibs.indexOf(body);
        for (let i = bi + 1; i < bodySibs.length; i++) {
          if (bodySibs[i].classList?.contains('note-table-wrap')) {
            selectTable(bodySibs[i]);
            toast('표 선택됨 — Ctrl+C로 복사, Ctrl+X로 잘라내기');
            return;
          }
        }
      });
    }

    if (e.key === 'ArrowUp') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        const r = sel2.getRangeAt(0);
        const rects = r.getClientRects();
        const caretTop = rects.length > 0 ? rects[0].top : r.getBoundingClientRect().top;
        const bodyTop = body.getBoundingClientRect().top;
        if (caretTop > bodyTop + 5) return;
        // 커서가 body 상단 → body 이전 형제에서 표 찾기
        const bodyParent = body.parentElement;
        if (!bodyParent) return;
        const bodySibs = Array.from(bodyParent.children);
        const bi = bodySibs.indexOf(body);
        for (let i = bi - 1; i >= 0; i--) {
          if (bodySibs[i].classList?.contains('note-table-wrap')) {
            selectTable(bodySibs[i]);
            toast('표 선택됨 — Ctrl+C로 복사, Ctrl+X로 잘라내기');
            return;
          }
        }
      });
    }
  });

  // Delete/BackSpace 키로 선택된 표 삭제
  document.addEventListener('keydown', e => {
    if (e.key !== 'Delete' && e.key !== 'Backspace' && e.key !== 'Escape') return;

    if (e.key === 'Escape') { deselectTable(); return; }

    // 1) 선택된 표가 있으면 바로 삭제
    if (_selectedTableWrap) {
      e.preventDefault();
      const prev = _selectedTableWrap.previousElementSibling;
      const next = _selectedTableWrap.nextElementSibling;
      _selectedTableWrap.remove();
      _selectedTableWrap = null;
      hideTableContextToolbar();
      const target = prev || next;
      if (target && target.isContentEditable) { target.focus(); placeCursorAtEnd(target); }
      autoSave(); toast('표를 삭제했어요');
      return;
    }

    // 2) 커서가 표 경계에 있을 때
    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    if (active.nodeName === 'TD' || active.nodeName === 'TH') return; // 셀 안은 제외
    const inPage = active.closest('.editor-page');
    if (!inPage) return;

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || !sel.isCollapsed) return;

    const range = sel.getRangeAt(0);
    const body = active;

    if (e.key === 'Backspace') {
      // 커서가 현재 블록의 맨 앞인지 확인
      const atStart = isCursorAtStart(range, body);
      if (!atStart) return;
      // body 안 커서 위치의 이전 형제에서 표 찾기
      let node = range.startContainer;
      // 현재 노드의 부모 중 body 직계 자식 찾기
      while (node && node.parentNode !== body) node = node.parentNode;
      const prevSib = node ? node.previousElementSibling : body.lastElementChild;
      if (prevSib && prevSib.classList.contains('note-table-wrap')) {
        e.preventDefault();
        prevSib.remove();
        hideTableContextToolbar();
        autoSave(); toast('표를 삭제했어요');
      }
    }

    if (e.key === 'Delete') {
      // 커서가 현재 블록의 맨 끝인지 확인
      const atEnd = isCursorAtEnd(range, body);
      if (!atEnd) return;
      let node = range.startContainer;
      while (node && node.parentNode !== body) node = node.parentNode;
      const nextSib = node ? node.nextElementSibling : body.firstElementChild;
      if (nextSib && nextSib.classList.contains('note-table-wrap')) {
        e.preventDefault();
        nextSib.remove();
        hideTableContextToolbar();
        autoSave(); toast('표를 삭제했어요');
      }
    }
  });

  function isCursorAtStart(range, body) {
    if (range.startOffset !== 0) return false;
    let node = range.startContainer;
    while (node && node !== body) {
      if (node.previousSibling) return false;
      node = node.parentNode;
    }
    return true;
  }

  function isCursorAtEnd(range, body) {
    let node = range.startContainer;
    if (node.nodeType === Node.TEXT_NODE) {
      if (range.startOffset < node.textContent.length) return false;
    }
    while (node && node !== body) {
      if (node.nextSibling) return false;
      node = node.parentNode;
    }
    return true;
  }

  // 페이지 경계 Delete / Backspace — 다음 페이지 내용을 현재 페이지로 병합
  document.addEventListener('keydown', e => {
    if (e.key !== 'Delete' && e.key !== 'Backspace') return;
    if (e.ctrlKey || e.metaKey) return;

    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    if (active.nodeName === 'TD' || active.nodeName === 'TH') return;
    const inPage = active.closest('.editor-page');
    if (!inPage) return;

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || !sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    const body = active;

    const pages = Array.from(document.querySelectorAll('.editor-page'));
    const curIdx = pages.indexOf(inPage);

    if (e.key === 'Delete' && isCursorAtEnd(range, body)) {
      // 커서가 현재 페이지 body 맨 끝 → 다음 페이지 내용 병합
      if (curIdx >= pages.length - 1) return; // 마지막 페이지면 패스
      const nextPage = pages[curIdx + 1];
      const nextBody = nextPage.querySelector('[contenteditable]');
      if (!nextBody) return;

      // 다음 페이지 내용이 아예 비어있으면 그냥 페이지만 삭제
      const nextEmpty = nextBody.textContent.trim() === '' && nextBody.querySelectorAll('table, img').length === 0;
      if (nextEmpty) {
        e.preventDefault();
        nextPage.remove();
        updatePageNumbers();
        autoSave();
        return;
      }

      e.preventDefault();
      // 커서 위치 기억 (현재 body 끝)
      const insertBefore = null; // body 끝에 추가

      // 다음 페이지의 모든 자식을 현재 body로 이동
      Array.from(nextBody.childNodes).forEach(node => {
        body.appendChild(node.cloneNode(true));
      });

      // 이동된 표 이벤트 재연결
      body.querySelectorAll('.note-table-wrap').forEach(wrap => {
        const tbl = wrap.querySelector('.note-table');
        if (tbl) { tbl.querySelectorAll('td,th').forEach(c=>c._ev=false); attachTableEvents(tbl); }
        wrap.querySelectorAll('.tbl-resize-handle,.tbl-drag-handle').forEach(h=>h.remove());
        addTableResizeHandle(wrap);
        const dh = document.createElement('div');
        dh.className='tbl-drag-handle'; dh.innerHTML='⠿ 표 이동'; dh.contentEditable='false';
        wrap.appendChild(dh); attachTableDragHandle(dh, wrap);
      });

      nextPage.remove();
      updatePageNumbers();

      // 커서를 병합 지점(원래 body 끝이었던 곳)에 유지
      // → 병합 직후 커서는 새로 붙은 내용 첫 노드 앞
      // 이미 body 끝에 포커스가 있으므로 그대로 두면 됨
      body.focus();
      autoSave();
      return;
    }

    if (e.key === 'Backspace' && isCursorAtStart(range, body)) {
      // 커서가 현재 페이지 body 맨 앞 → 이전 페이지로 병합
      if (curIdx === 0) return; // 첫 페이지면 패스
      const prevPage = pages[curIdx - 1];
      const prevBody = prevPage.querySelector('[contenteditable]');
      if (!prevBody) return;

      // 현재 페이지가 비어있으면 그냥 삭제
      const curEmpty = body.textContent.trim() === '' && body.querySelectorAll('table, img').length === 0;
      if (curEmpty) {
        e.preventDefault();
        inPage.remove();
        updatePageNumbers();
        prevBody.focus();
        placeCursorAtEnd(prevBody);
        autoSave();
        return;
      }

      e.preventDefault();
      // 현재 페이지의 모든 자식을 이전 페이지 body 끝에 이동
      Array.from(body.childNodes).forEach(node => {
        prevBody.appendChild(node.cloneNode(true));
      });

      // 이동된 표 이벤트 재연결
      prevBody.querySelectorAll('.note-table-wrap').forEach(wrap => {
        const tbl = wrap.querySelector('.note-table');
        if (tbl) { tbl.querySelectorAll('td,th').forEach(c=>c._ev=false); attachTableEvents(tbl); }
        wrap.querySelectorAll('.tbl-resize-handle,.tbl-drag-handle').forEach(h=>h.remove());
        addTableResizeHandle(wrap);
        const dh = document.createElement('div');
        dh.className='tbl-drag-handle'; dh.innerHTML='⠿ 표 이동'; dh.contentEditable='false';
        wrap.appendChild(dh); attachTableDragHandle(dh, wrap);
      });

      inPage.remove();
      updatePageNumbers();
      prevBody.focus();
      placeCursorAtEnd(prevBody);
      autoSave();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp' && e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
    const active = document.activeElement;
    if (!active || !active.isContentEditable) return;
    const inPage = active.closest('.editor-page');
    if (!inPage) return;
    const inCell = active.nodeName === 'TD' || active.nodeName === 'TH';
    if (inCell) return; // 표 셀은 표 전용 핸들러가 처리

    const body = active;
    const pages = Array.from(document.querySelectorAll('.editor-page'));
    const curIdx = pages.indexOf(inPage);

    // ↓ : 브라우저 처리 후 커서가 body 밖이면 다음 페이지
    if (e.key === 'ArrowDown') {
      const snapRange = window.getSelection()?.rangeCount > 0 ? window.getSelection().getRangeAt(0).cloneRange() : null;
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        // 커서가 여전히 같은 body 안에 있으면 이동 불필요
        if (body.contains(sel2.anchorNode)) {
          // 추가 체크: 커서 Y가 body 바닥에 있는지
          const r = sel2.getRangeAt(0);
          const rects = r.getClientRects();
          const caretBottom = rects.length > 0 ? rects[0].bottom : r.getBoundingClientRect().bottom;
          const bodyBottom = body.getBoundingClientRect().bottom;
          if (caretBottom < bodyBottom - 5) return; // 아직 중간 → 이동 불필요
        }
        // 커서가 body 밖이거나 body 바닥 → 다음 페이지
        if (curIdx < pages.length - 1) {
          const nextBody = pages[curIdx + 1].querySelector('[contenteditable]');
          if (nextBody) {
            nextBody.focus();
            const r2 = document.createRange();
            r2.setStart(nextBody, 0);
            r2.collapse(true);
            sel2.removeAllRanges(); sel2.addRange(r2);
            pages[curIdx + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
      });
    }

    // ↑ : 브라우저 처리 후 커서가 body 밖이면 이전 페이지
    if (e.key === 'ArrowUp') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        if (body.contains(sel2.anchorNode)) {
          const r = sel2.getRangeAt(0);
          const rects = r.getClientRects();
          const caretTop = rects.length > 0 ? rects[0].top : r.getBoundingClientRect().top;
          const bodyTop = body.getBoundingClientRect().top;
          if (caretTop > bodyTop + 5) return;
        }
        if (curIdx > 0) {
          const prevBody = pages[curIdx - 1].querySelector('[contenteditable]');
          if (prevBody) {
            prevBody.focus();
            placeCursorAtEnd(prevBody);
            pages[curIdx - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }
      });
    }

    // → : body 밖으로 나갔고 다음에 표가 있으면 표 첫 셀로
    if (e.key === 'ArrowRight') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        if (body.contains(sel2.anchorNode)) return;
        const siblings = Array.from(body.parentNode?.children || []);
        const bi = siblings.indexOf(body);
        for (let i = bi + 1; i < siblings.length; i++) {
          if (siblings[i].classList?.contains('note-table-wrap')) {
            const firstCell = siblings[i].querySelector('th, td');
            if (firstCell) { firstCell.focus(); placeCursorAtStart(firstCell); }
            return;
          }
        }
      });
    }

    // ← : body 밖으로 나갔고 이전에 표가 있으면 표 마지막 셀로
    if (e.key === 'ArrowLeft') {
      requestAnimationFrame(() => {
        const sel2 = window.getSelection();
        if (!sel2 || sel2.rangeCount === 0) return;
        if (body.contains(sel2.anchorNode)) return;
        const siblings = Array.from(body.parentNode?.children || []);
        const bi = siblings.indexOf(body);
        for (let i = bi - 1; i >= 0; i--) {
          if (siblings[i].classList?.contains('note-table-wrap')) {
            const cells = siblings[i].querySelectorAll('td, th');
            if (cells.length) { cells[cells.length - 1].focus(); placeCursorAtEnd(cells[cells.length - 1]); }
            return;
          }
        }
      });
    }
  });


  // Ctrl+S 저장, Ctrl+Z undo, Ctrl+Y redo, Shift+8 → ×, Ctrl+Enter → 새 페이지
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveState(); toast('💾 저장됐어요!'); }
    if ((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { if(document.getElementById('editor-view').style.display!=='none') doUndo(); }
    if ((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))) { if(document.getElementById('editor-view').style.display!=='none') doRedo(); }

    // Ctrl+Enter → 현재 페이지 바로 뒤에 새 페이지 추가
    if ((e.ctrlKey||e.metaKey) && e.key==='Enter') {
      const inPage = document.activeElement?.closest('.editor-page');
      if (inPage) {
        e.preventDefault();
        const container = document.getElementById('pages-container');
        const pages = Array.from(container.querySelectorAll('.editor-page'));
        const curIdx = pages.indexOf(inPage);
        const newPage = document.createElement('div');
        newPage.className = 'editor-page';
        const newBody = makeBodyEl();
        newPage.appendChild(newBody);
        // 현재 페이지 바로 뒤에 삽입
        if (pages[curIdx + 1]) {
          container.insertBefore(newPage, pages[curIdx + 1]);
        } else {
          container.appendChild(newPage);
        }
        updatePageNumbers();
        newBody.focus();
        setTimeout(() => newPage.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        toast('새 페이지 추가됐어요');
      }
    }

    // Shift+8 → · 가운데 점, Ctrl+8 → × 곱하기
    const active = document.activeElement;
    const inEditor = active && (
      active.id === 'editor-body' ||
      document.getElementById('editor-body')?.contains(active) ||
      active.closest('.note-table-wrap')
    );
    if (inEditor && !e.metaKey) {
      if ((e.shiftKey && !e.ctrlKey && e.code==='Digit8') ||
          (e.ctrlKey && !e.shiftKey && e.code==='Digit8')) {
        e.preventDefault();
        e.stopPropagation();
        const char = e.shiftKey ? '·' : '×';
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0) {
          const range = sel.getRangeAt(0);
          range.deleteContents();
          const textNode = document.createTextNode(char);
          range.insertNode(textNode);
          range.setStartAfter(textNode);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
          // input 이벤트 수동 발생 (autoSave 등 처리)
          active.dispatchEvent(new Event('input', {bubbles:true}));
        }
      }
    }
  });

  setInterval(saveState, 30000);
  window.addEventListener('beforeunload', () => saveState());
});
</script>
