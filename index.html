<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>✏️ 스터디노트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gaegu:wght@300;400;700&family=Nanum+Gothic:wght@400;700;800&family=Do+Hyeon&family=Jua&family=Cute+Font&family=Nanum+Myeongjo:wght@400;700;800&family=Black+Han+Sans&family=Gugi&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css');
:root {
  --bg: #faf9f6; --sidebar-bg: #1a1a2e; --sidebar-accent: #e94560;
  --card-bg: #ffffff; --border: #e0ddd5; --text: #2d2d2d; --subtext: #888;
  --accent: #e94560; --accent2: #0f3460; --radius: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08); --font-main: 'Nanum Gothic', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; height: 100dvh; }
body {
  font-family: var(--font-main); background: var(--bg); color: var(--text);
  display: flex;
  height: 100vh; height: 100dvh;   /* dvh = 크롬 주소창 제외한 실제 높이 */
  max-height: 100vh; max-height: 100dvh;
  overflow: hidden;
}

/* ── MAIN ── */
#main {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
  height: 100vh; height: 100dvh;
  max-height: 100vh; max-height: 100dvh;
}

/* ── EDITOR VIEW ── */
#editor-view {
  flex: 1;
  display: none;
  flex-direction: column;
  height: 100%;
  max-height: 100%;
  overflow: hidden;
  min-height: 0;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 220px; min-width: 220px;
  background: var(--sidebar-bg); color: #eee;
  display: flex; flex-direction: column; overflow-y: auto; z-index: 10;
  transition: width 0.22s ease, min-width 0.22s ease, padding 0.22s ease;
}
#sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; }
#sidebar-toggle {
  position: fixed; left: 220px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 48px;
  background: var(--sidebar-bg);
  border: none; border-radius: 0 8px 8px 0;
  cursor: pointer; color: rgba(255,255,255,0.6);
  font-size: 11px; display: flex; align-items: center; justify-content: center;
  z-index: 100; transition: left 0.22s ease;
  box-shadow: 2px 0 8px rgba(0,0,0,0.15);
}
#sidebar-toggle:hover { color: #fff; background: var(--sidebar-accent); }
body.sidebar-hidden #sidebar-toggle { left: 0; }
#sidebar-header { padding: 22px 18px 14px; font-size: 20px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 8px; }
#sidebar-header span { color: var(--sidebar-accent); }
.sidebar-section { padding: 12px 10px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); }
.subject-item { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 8px; margin: 2px 8px; cursor: pointer; font-size: 13.5px; transition: background 0.15s; color: rgba(255,255,255,0.75); }
.subject-item:hover { background: rgba(255,255,255,0.08); }
.subject-item.active { background: var(--sidebar-accent); color: #fff; font-weight: 700; }
.subject-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.subject-count { margin-left: auto; font-size: 11px; background: rgba(255,255,255,0.15); border-radius: 10px; padding: 1px 7px; }
.subject-actions { display: flex; gap: 3px; }
.subject-edit-btn { font-size: 11px; opacity: 0.5; cursor: pointer; background: none; border: none; color: #fff; padding: 1px 3px; border-radius: 4px; }
.subject-edit-btn:hover { opacity: 1; background: rgba(255,255,255,0.2); }
#add-subject-btn { margin: 6px 10px; padding: 8px 14px; background: rgba(255,255,255,0.07); border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; color: rgba(255,255,255,0.5); font-size: 12.5px; cursor: pointer; text-align: center; transition: all 0.15s; }
#add-subject-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
#sidebar-footer { margin-top: auto; padding: 14px 12px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── TOPBAR (list view) ── */
#topbar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#topbar-left { display: flex; align-items: center; gap: 8px; flex: 1; }
.tb-btn { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg); font-size: 12.5px; cursor: pointer; font-family: var(--font-main); color: var(--text); transition: all 0.15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.tb-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.tb-btn.primary:hover { opacity: 0.88; }

/* ── NOTES GRID ── */
#notes-view { flex: 1; overflow-y: auto; padding: 20px; }
#notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.note-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 18px 16px 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; }
.note-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.note-card-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
.note-card-preview { font-size: 12px; color: var(--subtext); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.note-card-meta { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11px; color: var(--subtext); }
.note-card-subject { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; color: #fff; }
.note-card-del { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; font-size: 15px; color: var(--subtext); opacity: 0; transition: opacity 0.15s; }
.note-card:hover .note-card-del { opacity: 1; }
#empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--subtext); gap: 12px; padding: 40px; text-align: center; }
#empty-state .big-icon { font-size: 56px; }
#empty-state h3 { font-size: 18px; color: var(--text); }
#empty-state p { font-size: 13px; max-width: 280px; line-height: 1.7; }

/* ── EDITOR TOPBAR (블록 추가 버튼들) ── */
#editor-topbar {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 7px 14px;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
  min-height: 0;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: thin;
}
#editor-topbar::-webkit-scrollbar { height: 3px; }
#editor-topbar::-webkit-scrollbar-thumb { background: var(--border); }

/* ── FORMATTING TOOLBAR ── */
#editor-toolbar {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 5px 12px;
  display: flex; align-items: center; gap: 3px;
  flex-shrink: 0;
  min-height: 0;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: thin;
}
#editor-toolbar::-webkit-scrollbar { height: 3px; }
#editor-toolbar::-webkit-scrollbar-thumb { background: var(--border); }
.tool-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.tool-btn { width: 30px; height: 30px; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.12s; color: var(--text); flex-shrink: 0; }
.tool-btn:hover { background: rgba(0,0,0,0.07); }
.tool-btn.active { background: var(--accent); color: #fff; }
select.tool-select { height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); font-size: 12px; padding: 0 6px; cursor: pointer; color: var(--text); font-family: var(--font-main); flex-shrink: 0; }
input.tool-color { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; padding: 2px; background: none; flex-shrink: 0; }
.color-row { display: flex; gap: 5px; align-items: center; }
.color-swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border 0.12s; flex-shrink: 0; }
.color-swatch:hover { border-color: #333; }
.hl-remove { background: linear-gradient(135deg,#fff 45%,#e00 50%,#fff 55%) !important; border: 1px solid #ccc !important; }

/* ── EDITOR HEADER (제목/과목/날짜) ── */
#editor-header { background: var(--card-bg); border-bottom: 2px solid var(--border); padding: 12px 24px 10px; flex-shrink: 0; }
#editor-big-title { font-size: 22px; font-weight: 800; border: none; outline: none; background: transparent; width: 100%; color: var(--text); font-family: var(--font-main); margin-bottom: 6px; }
#editor-meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.meta-label { font-size: 12px; color: var(--subtext); }
#subject-select-editor { border: 1px solid var(--border); border-radius: 7px; padding: 4px 10px; font-size: 13px; background: var(--bg); color: var(--text); font-family: var(--font-main); cursor: pointer; outline: none; }

/* ── EDITOR SCROLL + PAPER ── */
#editor-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 24px 24px 60px; min-height: 0;
  background: #e8e6e0; -webkit-overflow-scrolling: touch;
}

/* A4 비율 페이지 분할 뷰 */
/* A4: 210×297mm → 96dpi 기준 794×1123px, 패딩 빼면 내용 높이 약 1010px */
:root {
  --page-w: 794px;
  --page-h: 1123px;
  --page-pad-x: 60px;
  --page-pad-y: 52px;
}

#editor-paper {
  background: #fff;
  box-shadow: 0 2px 16px rgba(0,0,0,0.13);
  width: var(--page-w);
  max-width: 100%;
  margin: 0 auto;
  padding: var(--page-pad-y) var(--page-pad-x);
  border-radius: 2px;
  position: relative;
  box-sizing: border-box;
  /* A4 구분선: 1123px마다 빨간 점선 */
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent calc(var(--page-h) - 2px),
    rgba(210,40,40,0.22) calc(var(--page-h) - 2px),
    rgba(210,40,40,0.22) var(--page-h),
    transparent var(--page-h)
  );
  background-size: 100% var(--page-h);
}

/* 페이지 번호 레이블 */
#page-break-labels {
  position: absolute; top: 0; left: 0; right: 0;
  pointer-events: none; z-index: 2;
}
.page-break-label {
  position: absolute; right: 8px;
  font-size: 10px; color: rgba(210,40,40,0.45);
  font-family: var(--font-main); white-space: nowrap;
}

/* 실제 편집 영역 */
#editor-body {
  outline: none;
  font-size: 14.5px;
  line-height: 1.9;
  font-family: var(--font-main);
  color: var(--text);
  min-height: calc(var(--page-h) - var(--page-pad-y) * 2);
  word-break: break-word;
  width: 100%;
  position: relative;
  z-index: 1;
}
#editor-body:empty:before { content: '여기에 내용을 입력하세요...'; color: #bbb; pointer-events: none; font-style: italic; }

/* 에디터 내부 요소 스타일 */
#editor-paper h1.note-h1 { font-size: 20px; font-weight: 800; color: var(--accent2); border-bottom: 2.5px solid var(--accent2); padding: 4px 0; margin: 10px 0 4px; }
#editor-paper h2.note-h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; border-left: 4px solid var(--accent); padding: 3px 10px; margin: 8px 0 2px; }
#editor-paper p { margin: 2px 0; min-height: 1.9em; }
#editor-paper ol.note-ol { padding-left: 26px; margin: 4px 0; }
#editor-paper ol.note-ol li { line-height: 1.9; padding: 1px 0; }
#editor-paper ol.note-ol li::marker { color: var(--accent); font-weight: 700; }
#editor-paper ul.note-ul { padding-left: 22px; margin: 4px 0; list-style: disc; }
#editor-paper ul.note-ul li { line-height: 1.9; }
#editor-paper ul.note-ul li::marker { color: var(--accent); }

/* 표 */
.note-table-wrap {
  margin: 10px 0;
  position: relative;
  display: block;
  width: 100%;
  max-width: 100%;
  overflow-x: auto;
}
.note-table {
  border-collapse: collapse;
  table-layout: fixed;  /* 고정 레이아웃 — 열 너비 균등 */
  width: 100%;
}
/* colgroup으로 너비 제어하므로 셀엔 width 안 줌 */
.note-table td, .note-table th {
  border: 1.5px solid #ccc;
  padding: 8px 12px;
  font-size: 14px;
  line-height: 1.75;
  outline: none;
  vertical-align: top;
  font-family: var(--font-main);
  position: relative;
  word-break: break-all;
  overflow-wrap: anywhere;
  overflow: hidden;
  box-sizing: border-box;
}
.note-table th { font-weight: 700; text-align: center; }
.note-table td.selected-cell, .note-table th.selected-cell { outline: 2.5px solid var(--accent); background: rgba(233,69,96,0.07); }

/* 컬럼 리사이즈 핸들 — 셀 내부가 아닌 thead 위에 absolute 오버레이 */
.col-resize-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 4;
}
.col-resize-line {
  position: absolute;
  top: 0;
  width: 6px;
  height: 100%;
  cursor: col-resize;
  pointer-events: all;
  background: transparent;
  transform: translateX(-3px);
  transition: background 0.12s;
}
.col-resize-line:hover, .col-resize-line.resizing { background: rgba(233,69,96,0.4); }

/* 표 세로 리사이즈 핸들 */
.tbl-row-resize-handle {
  position: absolute; left: 0; bottom: -8px;
  width: 100%; height: 8px;
  cursor: row-resize; z-index: 10;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
}
.tbl-row-resize-handle::after {
  content: '';
  width: 40px; height: 3px;
  background: var(--accent);
  border-radius: 3px;
  opacity: 0;
  transition: opacity 0.15s;
}
.note-table-wrap:hover .tbl-row-resize-handle::after { opacity: 0.7; }
body.row-resizing * { cursor: row-resize !important; user-select: none !important; }
.tbl-resize-handle {
  position: absolute; right: -8px; bottom: 28px;
  width: 16px; height: 16px;
  background: var(--accent); border-radius: 3px;
  cursor: se-resize; z-index: 10;
  opacity: 0; transition: opacity 0.15s;
}
.note-table-wrap:hover .tbl-resize-handle { opacity: 0.85; }
body.tbl-resizing * { cursor: se-resize !important; user-select: none !important; }
body.col-resizing * { cursor: col-resize !important; user-select: none !important; }

/* contentEditable=false wrap 안 셀 편집 정상화 */
.note-table-wrap [contenteditable="true"] {
  -webkit-user-select: text; user-select: text; cursor: text;
}

.table-toolbar { display: none !important; } /* 표 아래 툴바 숨김 — 상단 고정 툴바로 대체 */
.tbl-btn { font-size: 11px; padding: 2px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-family: var(--font-main); transition: all 0.12s; }
.tbl-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── 표 컨텍스트 툴바 (상단 고정) ── */
#table-context-toolbar {
  background: #fff8f0;
  border-bottom: 1px solid var(--border);
  border-top: 1px solid #ffd5a0;
  padding: 5px 12px;
  display: none;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: thin;
}
#table-context-toolbar.visible { display: flex; }
#table-context-toolbar::-webkit-scrollbar { height: 3px; }
#table-context-toolbar::-webkit-scrollbar-thumb { background: var(--border); }
.tbl-ctx-label {
  font-size: 11px; font-weight: 700; color: var(--accent);
  margin-right: 4px; flex-shrink: 0; letter-spacing: 0.3px;
}
.tbl-ctx-sep {
  width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 3px;
}
#table-context-toolbar .tbl-btn {
  font-size: 12px; padding: 3px 10px;
}

/* 표 드래그 핸들 */
.tbl-drag-handle {
  position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; border-radius: 6px 6px 0 0;
  font-size: 11px; padding: 2px 10px; cursor: grab; user-select: none;
  opacity: 0; transition: opacity 0.15s; white-space: nowrap; z-index: 20;
  display: flex; align-items: center; gap: 4px;
}
.note-table-wrap:hover .tbl-drag-handle { opacity: 1; }
.tbl-drag-handle:active { cursor: grabbing; }
body.tbl-dragging * { cursor: grabbing !important; user-select: none !important; }

/* 표 선택 상태 */
.note-table-wrap.table-selected {
  outline: 2.5px solid var(--accent);
  background: rgba(233,69,96,0.04);
  border-radius: 4px;
}
/* 표 드롭 위치 표시선 */
.tbl-drop-indicator {
  height: 3px; background: var(--accent); border-radius: 3px;
  margin: 4px 0; pointer-events: none; display: none;
}

/* 이미지 */
.note-img-wrap { display: block; margin: 8px 0; text-align: center; position: relative; }
.note-img-wrap img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
.img-upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 24px 30px; text-align: center; cursor: pointer; color: var(--subtext); font-size: 13px; transition: all 0.15s; display: block; }
.img-upload-area:hover { border-color: var(--accent); color: var(--accent); }

/* 정렬 */
[data-align="left"]   { text-align: left; }
[data-align="center"] { text-align: center; }
[data-align="right"]  { text-align: right; }
[data-align="justify"]{ text-align: justify; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal { background: #fff; border-radius: 14px; padding: 26px 28px; min-width: 300px; max-width: 520px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal h3 { font-size: 17px; margin-bottom: 14px; }
.modal input, .modal select { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; font-family: var(--font-main); margin-bottom: 10px; outline: none; }
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
.modal-btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13.5px; font-family: var(--font-main); font-weight: 700; transition: all 0.15s; }
.modal-btn.cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.modal-btn.confirm { background: var(--accent); color: #fff; }

/* ── TOAST ── */
#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1a2e; color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 13.5px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EXAM LOADING ── */
#exam-loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; gap: 14px; color: #fff; font-size: 15px; }
#exam-loading.show { display: flex; }
.exam-spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: fixed; inset: 0; background: #fff; padding: 30px; } }

::-webkit-scrollbar { width: 6px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 6px; }

#autosave-info { font-size: 11px; color: var(--subtext); display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">✏️ <span>스터디</span>노트</div>
  <div class="sidebar-section">과목</div>
  <div id="subject-list"></div>
  <button id="add-subject-btn" onclick="openAddSubject()">＋ 과목 추가</button>
  <div id="sidebar-footer">자동 저장 중</div>
</div>

<!-- SIDEBAR TOGGLE -->
<button id="sidebar-toggle" onclick="toggleSidebar()" title="사이드바 숨기기/보이기">◀</button>

<!-- MAIN -->
<div id="main">

  <!-- TOPBAR (list view) -->
  <div id="topbar">
    <div id="topbar-left">
      <span id="current-subject-label" style="font-weight:800;font-size:15px;color:var(--accent2)">전체 노트</span>
      <span id="autosave-info"><span style="width:7px;height:7px;border-radius:50%;background:#4caf50;display:inline-block"></span>저장됨</span>
    </div>
    <button class="tb-btn" id="subject-exam-btn" style="display:none" onclick="makeSubjectExam()">📋 과목 전체 시험지</button>
    <button class="tb-btn primary" onclick="createNote()">＋ 새 노트</button>
  </div>

  <!-- NOTES GRID -->
  <div id="notes-view">
    <div id="empty-state" style="display:none">
      <div class="big-icon">📝</div>
      <h3>아직 노트가 없어요</h3>
      <p>오른쪽 위 "새 노트" 버튼을 눌러 첫 노트를 만들어 보세요!</p>
    </div>
    <div id="notes-grid"></div>
  </div>

  <!-- EDITOR VIEW -->
  <div id="editor-view">

    <!-- 블록 삽입 툴바 -->
    <div id="editor-topbar">
      <button class="tb-btn" onclick="backToList()">← 목록</button>
      <div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div>
      <span id="page-indicator" style="font-size:12px;color:var(--subtext);flex-shrink:0;padding:0 4px">1 / 1 페이지</span>
      <div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div>
      <button class="tb-btn" onclick="doUndo()" title="실행 취소 (Ctrl+Z)" id="btn-undo">↩ 취소</button>
      <button class="tb-btn" onclick="doRedo()" title="다시 실행 (Ctrl+Y)" id="btn-redo">↪ 재실행</button>
      <div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div>
      <button class="tb-btn" onclick="insertH1()">📌 대주제</button>
      <button class="tb-btn" onclick="insertH2()">📂 소주제</button>
      <button class="tb-btn" onclick="insertOL()">🔢 번호목록</button>
      <button class="tb-btn" onclick="insertUL()">• 목록</button>
      <button class="tb-btn" onclick="showTableModal()">📊 표</button>
      <button class="tb-btn" onclick="insertImage()">🖼️ 이미지</button>
      <div style="flex:1"></div>
      <button class="tb-btn" onclick="makeExam()">📋 시험지</button>
      <button class="tb-btn primary" onclick="savePDF()">⬇️ PDF</button>
    </div>

    <!-- 서식 툴바 -->
    <div id="editor-toolbar">
      <select class="tool-select" id="fontSelect" onchange="applyFont(this.value)">
        <option value="'Pretendard',sans-serif">Pretendard</option>
        <option value="'Nanum Gothic',sans-serif">나눔고딕</option>
        <option value="'Nanum Myeongjo',serif">나눔명조</option>
        <option value="'Do Hyeon',sans-serif">도현체</option>
        <option value="'Jua',sans-serif">주아체</option>
        <option value="'Cute Font',cursive">귀여운폰트</option>
        <option value="'Gaegu',cursive">개구체</option>
        <option value="'Nanum Pen Script',cursive">나눔손글씨</option>
        <option value="'Black Han Sans',sans-serif">검정한산스</option>
        <option value="'Gugi',cursive">구기체</option>
        <option value="Georgia,serif">Georgia</option>
      </select>
      <select class="tool-select" id="sizeSelect" onchange="applyFontSize(this.value)">
        <option value="11px">11</option><option value="12px">12</option><option value="13px">13</option>
        <option value="14px" selected>14</option><option value="16px">16</option><option value="18px">18</option>
        <option value="20px">20</option><option value="24px">24</option><option value="28px">28</option><option value="32px">32</option>
      </select>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="fmt('bold')" title="굵게"><b>B</b></button>
      <button class="tool-btn" onclick="fmt('italic')" title="기울기"><i>I</i></button>
      <button class="tool-btn" onclick="fmt('underline')" title="밑줄"><u>U</u></button>
      <button class="tool-btn" onclick="fmt('strikeThrough')" title="취소선"><s>S</s></button>
      <div class="tool-sep"></div>
      <span style="font-size:11px;color:var(--subtext);flex-shrink:0">글색</span>
      <input type="color" class="tool-color" id="textColor" value="#2d2d2d" oninput="applyTextColor(this.value)">
      <span style="font-size:11px;color:var(--subtext);flex-shrink:0;margin-left:4px">형광펜</span>
      <div class="color-row" id="highlight-swatches"></div>
      <div class="tool-sep"></div>
      <!-- 정렬 버튼 -->
      <button class="tool-btn" id="aln-l" onclick="applyAlign('left')" title="왼쪽">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2"/><rect x="1" y="6" width="9" height="2"/><rect x="1" y="10" width="14" height="2"/><rect x="1" y="14" width="9" height="2"/></svg>
      </button>
      <button class="tool-btn" id="aln-c" onclick="applyAlign('center')" title="가운데">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2"/><rect x="3.5" y="6" width="9" height="2"/><rect x="1" y="10" width="14" height="2"/><rect x="3.5" y="14" width="9" height="2"/></svg>
      </button>
      <button class="tool-btn" id="aln-r" onclick="applyAlign('right')" title="오른쪽">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2"/><rect x="6" y="6" width="9" height="2"/><rect x="1" y="10" width="14" height="2"/><rect x="6" y="14" width="9" height="2"/></svg>
      </button>
      <button class="tool-btn" id="aln-j" onclick="applyAlign('justify')" title="양쪽">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2"/><rect x="1" y="6" width="14" height="2"/><rect x="1" y="10" width="14" height="2"/><rect x="1" y="14" width="14" height="2"/></svg>
      </button>
    </div>

    <!-- 표 컨텍스트 툴바 (표 셀 포커스 시 표시) -->
    <div id="table-context-toolbar">
      <span class="tbl-ctx-label">📊 표 편집</span>
      <div class="tbl-ctx-sep"></div>
      <button class="tbl-btn" id="tctx-add-row" onclick="tblCtxAction('addRow')">➕ 행 추가</button>
      <button class="tbl-btn" id="tctx-del-row" onclick="tblCtxAction('delRow')">➖ 행 삭제</button>
      <button class="tbl-btn" id="tctx-add-col" onclick="tblCtxAction('addCol')">➕ 열 추가</button>
      <button class="tbl-btn" id="tctx-del-col" onclick="tblCtxAction('delCol')">➖ 열 삭제</button>
      <div class="tbl-ctx-sep"></div>
      <button class="tbl-btn" id="tctx-merge" onclick="tblCtxAction('merge')">병합</button>
      <button class="tbl-btn" id="tctx-split" onclick="tblCtxAction('split')">분할</button>
      <button class="tbl-btn" id="tctx-eq-rows" onclick="tblCtxAction('equalRows')">↕ 높이균등</button>
      <button class="tbl-btn" id="tctx-eq-cols" onclick="tblCtxAction('equalCols')">↔ 너비균등</button>
      <button class="tbl-btn" id="tctx-img" onclick="tblCtxAction('insertImg')">🖼️ 셀이미지</button>
      <div class="tbl-ctx-sep"></div>
      <button class="tbl-btn" id="tctx-del-tbl" onclick="tblCtxAction('deleteTable')" style="color:var(--accent)">✕ 표 삭제</button>
      <span style="font-size:10px;color:var(--subtext);margin-left:6px;flex-shrink:0">Ctrl+클릭: 셀 선택 → 병합 / 분할은 원하는 개수로 늘리기 가능</span>
    </div>

    <!-- 제목/과목 헤더 -->
    <div id="editor-header">
      <input id="editor-big-title" placeholder="노트 제목..." oninput="autoSave()"/>
      <div id="editor-meta-row">
        <span class="meta-label">과목:</span>
        <select id="subject-select-editor" onchange="autoSave();applySubjectColor(this.value)"></select>
        <span id="editor-date" style="font-size:12px;color:var(--subtext);margin-left:8px"></span>
      </div>
    </div>

    <!-- 페이퍼 (단일 편집 + A4 구분선) -->
    <div id="editor-scroll">
      <div id="editor-paper">
        <div id="page-break-labels"></div>
        <div id="editor-body" contenteditable="true" spellcheck="false"></div>
      </div>
    </div>

  </div>
</div>

<!-- Modals -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>
<div id="toast"></div>
<div id="print-area" style="display:none"></div>
<div id="exam-loading"><div class="exam-spinner"></div><span id="exam-loading-msg">PDF 생성 중...</span></div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const COLORS = ['#e94560','#0f3460','#f5a623','#27ae60','#8e44ad','#2980b9','#e67e22','#16a085','#c0392b','#2c3e50'];
const HL_COLORS = ['#fff176','#b9f6ca','#bbdefb','#ffe0b2','#f8bbd0','transparent'];

let state = {
  subjects: [
    {id:'s1',name:'수학',color:'#e94560'},
    {id:'s2',name:'영어',color:'#0f3460'},
    {id:'s3',name:'국어',color:'#27ae60'},
  ],
  notes: [],
  currentNoteId: null,
  filterSubject: 'all'
};

function loadState() {
  try {
    const s = localStorage.getItem('studynote_v5');
    if (s) { const p = JSON.parse(s); state.subjects = p.subjects||state.subjects; state.notes = p.notes||[]; }
  } catch(e) {}
  // 첫 실행 시 가이드 노트 자동 생성
  if (state.notes.length === 0) {
    state.notes.push(createGuideNote());
  }
}

function createGuideNote() {
  return {
    id: 'guide_' + Date.now(),
    title: '✏️ 스터디노트 사용 가이드',
    subject: '',
    updatedAt: Date.now(),
    html: `<h1 class="note-h1">✏️ 스터디노트 사용 가이드</h1>
<p>스터디노트에 오신 걸 환영해요! 아래에서 주요 기능을 확인해보세요.</p>

<h2 class="note-h2">📝 입력 자동 변환</h2>
<div class="note-table-wrap" contenteditable="false" style="width:100%"><table class="note-table" style="width:100%"><colgroup><col style="width:30%"><col style="width:25%"><col style="width:45%"></colgroup>
<tbody>
<tr><th contenteditable="true">입력</th><th contenteditable="true">결과</th><th contenteditable="true">설명</th></tr>
<tr><td contenteditable="true">*</td><td contenteditable="true">·</td><td contenteditable="true">Shift+8 — 가운데 점</td></tr>
<tr><td contenteditable="true">Ctrl+8</td><td contenteditable="true">×</td><td contenteditable="true">곱하기 기호</td></tr>
<tr><td contenteditable="true">-&gt;</td><td contenteditable="true">→</td><td contenteditable="true">오른쪽 화살표</td></tr>
<tr><td contenteditable="true">&lt;-</td><td contenteditable="true">←</td><td contenteditable="true">왼쪽 화살표</td></tr>
<tr><td contenteditable="true">&lt;&amp;&gt;</td><td contenteditable="true">↔</td><td contenteditable="true">양방향 화살표</td></tr>
</tbody></table><div class="table-toolbar" contenteditable="false"></div></div>

<h2 class="note-h2">⌨️ 단축키</h2>
<div class="note-table-wrap" contenteditable="false" style="width:100%"><table class="note-table" style="width:100%"><colgroup><col style="width:35%"><col style="width:65%"></colgroup>
<tbody>
<tr><th contenteditable="true">단축키</th><th contenteditable="true">기능</th></tr>
<tr><td contenteditable="true">Ctrl+Enter</td><td contenteditable="true">현재 페이지 뒤에 새 페이지 추가</td></tr>
<tr><td contenteditable="true">Ctrl+S</td><td contenteditable="true">저장</td></tr>
<tr><td contenteditable="true">Ctrl+Z</td><td contenteditable="true">실행 취소</td></tr>
<tr><td contenteditable="true">Ctrl+Y / Ctrl+Shift+Z</td><td contenteditable="true">다시 실행</td></tr>
<tr><td contenteditable="true">Tab (표 안에서)</td><td contenteditable="true">다음 셀로 이동</td></tr>
<tr><td contenteditable="true">↑ / ↓ (표 안에서)</td><td contenteditable="true">위/아래 셀로 이동</td></tr>
<tr><td contenteditable="true">Ctrl+클릭 (표 셀)</td><td contenteditable="true">여러 셀 선택 (서식 일괄 적용)</td></tr>
</tbody></table><div class="table-toolbar" contenteditable="false"></div></div>

<h2 class="note-h2">📋 시험지 만들기</h2>
<p>백틱( \` )으로 감싼 단어가 시험지에서 빈칸으로 바뀌어요. 키보드 숫자 1 왼쪽 키예요.</p>
<p>예) 수도는 \`서울\`이다 → 수도는 ______①이다</p>
<p>시험지 PDF에는 빈칸 문제지 + 번호별 정답지가 함께 저장돼요.</p>

<h2 class="note-h2">🖼️ 기타 기능</h2>
<div class="note-table-wrap" contenteditable="false" style="width:100%"><table class="note-table" style="width:100%"><colgroup><col style="width:35%"><col style="width:65%"></colgroup>
<tbody>
<tr><th contenteditable="true">기능</th><th contenteditable="true">설명</th></tr>
<tr><td contenteditable="true">과목 관리</td><td contenteditable="true">왼쪽 사이드바에서 과목 추가/편집/삭제. 과목 색이 노트 테마색으로 적용돼요.</td></tr>
<tr><td contenteditable="true">페이지 이동</td><td contenteditable="true">툴바의 페이지 번호 입력 후 Enter — 해당 페이지로 바로 이동</td></tr>
<tr><td contenteditable="true">사이드바 숨기기</td><td contenteditable="true">사이드바 오른쪽 ◀ 버튼 클릭</td></tr>
<tr><td contenteditable="true">표 셀 병합</td><td contenteditable="true">Ctrl+클릭으로 셀 선택 후 [병합] 버튼</td></tr>
<tr><td contenteditable="true">형광펜</td><td contenteditable="true">텍스트 드래그 선택 후 형광펜 색 클릭. X 스와치로 제거.</td></tr>
<tr><td contenteditable="true">PDF 저장</td><td contenteditable="true">노트 PDF는 페이지 단위로 저장. 시험지도 요소 단위로 잘리지 않게 저장.</td></tr>
</tbody></table><div class="table-toolbar" contenteditable="false"></div></div>

<p style="color:#aaa;font-size:12px;margin-top:16px">이 노트는 삭제해도 되고, 그냥 참고용으로 남겨두셔도 돼요 😊</p>`
  };
}

function saveState() {
  if (state.currentNoteId) {
    const note = state.notes.find(n=>n.id===state.currentNoteId);
    if (note) {
      note.title = document.getElementById('editor-big-title').value;
      note.subject = document.getElementById('subject-select-editor').value;
      note.html = getAllHtml();
      note.updatedAt = Date.now();
    }
  }
  localStorage.setItem('studynote_v5', JSON.stringify({subjects:state.subjects,notes:state.notes}));
  const d = document.getElementById('autosave-info');
  if (d) d.innerHTML = '<span style="width:7px;height:7px;border-radius:50%;background:#4caf50;display:inline-block"></span> 저장됨';
}

let _saveTimer = null;
function autoSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(saveState, 700); }

// ══════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('subject-list');
  list.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'subject-item'+(state.filterSubject==='all'?' active':'');
  all.innerHTML = `<span class="subject-dot" style="background:#aaa"></span><span style="flex:1">전체 노트</span><span class="subject-count">${state.notes.length}</span>`;
  all.onclick = ()=>filterBySubject('all');
  list.appendChild(all);

  state.subjects.forEach(sub=>{
    const cnt = state.notes.filter(n=>n.subject===sub.id).length;
    const item = document.createElement('div');
    item.className = 'subject-item'+(state.filterSubject===sub.id?' active':'');
    item.innerHTML = `<span class="subject-dot" style="background:${sub.color}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sub.name}</span><span class="subject-count">${cnt}</span><span class="subject-actions"><button class="subject-edit-btn" onclick="event.stopPropagation();openEditSubject('${sub.id}')">✏️</button><button class="subject-edit-btn" onclick="event.stopPropagation();deleteSubject('${sub.id}')">🗑</button></span>`;
    item.onclick = ()=>filterBySubject(sub.id);
    list.appendChild(item);
  });

  const sel = document.getElementById('subject-select-editor');
  if (sel) sel.innerHTML = '<option value="">— 없음 —</option>'+state.subjects.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function filterBySubject(id) {
  state.filterSubject = id;
  // 에디터가 열려있으면 저장 후 목록으로
  if (document.getElementById('editor-view').style.display !== 'none') {
    saveState();
    state.currentNoteId = null;
    document.documentElement.style.setProperty('--accent','#e94560');
    document.getElementById('editor-view').style.display = 'none';
    document.getElementById('notes-view').style.display = '';
    document.getElementById('topbar').style.display = '';
  }
  renderSidebar(); renderNotesList();
  const lbl = document.getElementById('current-subject-label');
  const btn = document.getElementById('subject-exam-btn');
  if (id==='all') { lbl.textContent='전체 노트'; btn.style.display='none'; }
  else { const s=state.subjects.find(x=>x.id===id); lbl.textContent=s?s.name:''; btn.style.display=s?'flex':'none'; }
}

function openAddSubject() {
  const PCOLORS = ['#e94560','#0f3460','#f5a623','#27ae60','#8e44ad','#2980b9','#e67e22','#16a085','#e91e63','#607d8b'];
  showModal(`<h3>➕ 과목 추가</h3>
    <input id="m-name" placeholder="과목 이름" maxlength="20"/>
    <div style="font-size:12px;color:var(--subtext);margin-bottom:6px">색상</div>
    <div class="color-row" style="margin-bottom:8px">${PCOLORS.map(c=>`<div class="color-swatch" style="background:${c}" onclick="document.getElementById('m-color').value='${c}'"></div>`).join('')}</div>
    <input id="m-color" type="color" value="#e94560" style="width:100%;height:34px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer"/>
    <div class="modal-btns"><button class="modal-btn cancel" onclick="closeModal()">취소</button><button class="modal-btn confirm" onclick="confirmAddSubject()">추가</button></div>`);
}
function confirmAddSubject() {
  const name = document.getElementById('m-name').value.trim();
  const color = document.getElementById('m-color').value;
  if (!name) { toast('이름을 입력하세요'); return; }
  state.subjects.push({id:'s'+Date.now(),name,color});
  saveState(); renderSidebar(); closeModal(); toast('과목 추가됐어요! 🎉');
}
function openEditSubject(id) {
  const sub = state.subjects.find(s=>s.id===id); if(!sub) return;
  const PCOLORS = ['#e94560','#0f3460','#f5a623','#27ae60','#8e44ad','#2980b9','#e67e22','#16a085','#e91e63','#607d8b'];
  showModal(`<h3>✏️ 과목 편집</h3>
    <input id="m-ename" value="${sub.name}" maxlength="20"/>
    <div style="font-size:12px;color:var(--subtext);margin-bottom:6px">색상</div>
    <div class="color-row" style="margin-bottom:8px">${PCOLORS.map(c=>`<div class="color-swatch" style="background:${c}" onclick="document.getElementById('m-ecolor').value='${c}'"></div>`).join('')}</div>

// ══════════════════════════════════════════
//  INSERT ELEMENTS (커서 위치에 삽입)
// ══════════════════════════════════════════
function getEditorBody() { return document.getElementById('editor-body'); }

// 커서 복원 후 요소 삽입하는 헬퍼
function insertNodeAtCursor(node) {
  const body = getEditorBody();
  body.focus();
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) { body.appendChild(node); return; }
  const range = sel.getRangeAt(0);
  // editor-body 안인지 확인
  if (!body.contains(range.commonAncestorContainer)) { body.appendChild(node); body.focus(); return; }
  range.deleteContents();
  range.insertNode(node);
  // 커서를 삽입한 요소 뒤로
  range.setStartAfter(node);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  autoSave();
}

// range가 속한 contenteditable 요소를 찾아 focus하고 selection 복원
function focusAndRestoreSelection() {
  if (!_savedRange) return false;
  // range가 속한 contenteditable 찾기
  let node = _savedRange.commonAncestorContainer;
  let editableEl = null;
  while (node && node !== document.documentElement) {
    if (node.nodeType === 1 && node.isContentEditable) {
      editableEl = node;
      break;
    }
    node = node.parentNode;
  }
  if (editableEl) {
    editableEl.focus();
    // focus 후 selection 재적용
    const sel = window.getSelection();
    try {
      sel.removeAllRanges();
      sel.addRange(_savedRange.cloneRange());
      return true;
    } catch(e) {}
  }
  return false;
}

function insertH1() {
  if (!focusAndRestoreSelection()) {
    const body = getEditorBody(); body.focus(); placeCursorAtEnd(body);
  }
  document.execCommand('formatBlock', false, 'h1');
  const sel2 = window.getSelection();
  if (sel2 && sel2.anchorNode) {
    let node = sel2.anchorNode;
    while (node && node !== document.documentElement) {
      if (node.nodeName === 'H1') { node.className = 'note-h1'; break; }
      node = node.parentNode;
    }
  }
  autoSave();
}

function insertH2() {
  if (!focusAndRestoreSelection()) {
    const body = getEditorBody(); body.focus(); placeCursorAtEnd(body);
  }
  document.execCommand('formatBlock', false, 'h2');
  const sel2 = window.getSelection();
  if (sel2 && sel2.anchorNode) {
    let node = sel2.anchorNode;
    while (node && node !== document.documentElement) {
      if (node.nodeName === 'H2') { node.className = 'note-h2'; break; }
      node = node.parentNode;
    }
  }
  autoSave();
}

function insertOL() {
  if (!focusAndRestoreSelection()) { const body = getEditorBody(); body.focus(); placeCursorAtEnd(body); }
  document.execCommand('insertOrderedList', false, null);
  setTimeout(() => {
    (document.getElementById('editor-body')||{querySelectorAll:()=>[]}).querySelectorAll('ol:not(.note-ol)').forEach(ol => ol.classList.add('note-ol'));
    autoSave();
  }, 50);
}

function insertUL() {
  if (!focusAndRestoreSelection()) { const body = getEditorBody(); body.focus(); placeCursorAtEnd(body); }
  document.execCommand('insertUnorderedList', false, null);
  setTimeout(() => {
    (document.getElementById('editor-body')||{querySelectorAll:()=>[]}).querySelectorAll('ul:not(.note-ul)').forEach(ul => ul.classList.add('note-ul'));

// 이미지 삽입
function insertImage() {
  const body = getEditorBody(); body.focus();
  // 현재 selection 저장
  const sel = window.getSelection();
  let savedRange = null;
  if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();

  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.style.display='none';
  document.body.appendChild(inp);
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) { inp.remove(); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.style.cssText = 'max-width:100%;border-radius:8px;border:1px solid var(--border);display:block;margin:6px auto;';
      // 저장된 range 복원
      if (savedRange) {
        sel.removeAllRanges(); sel.addRange(savedRange);
      }
      insertNodeAtCursor(img);
      inp.remove(); autoSave();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// ══════════════════════════════════════════
//  TABLE RESIZE HANDLE (표 전체 크기)
// ══════════════════════════════════════════
// ══════════════════════════════════════════
//  TABLE UNDO STACK
// ══════════════════════════════════════════
// 표 조작은 contenteditable undo 스택에 안 들어가므로 별도 관리
const _tblUndo = new WeakMap(); // wrap → [{html, colWidths}]
const _tblRedo = new WeakMap();

function tblSnapshot(wrap) {
  const tbl = wrap.querySelector('.note-table');
  if (!tbl) return;
  const stack = _tblUndo.get(wrap) || [];
  stack.push({
    html: tbl.outerHTML,
    wrapW: wrap.style.width
  });
  if (stack.length > 30) stack.shift();
  _tblUndo.set(wrap, stack);
  _tblRedo.set(wrap, []); // redo 초기화
}

function tblUndoAction(wrap) {
  const stack = _tblUndo.get(wrap) || [];
  if (!stack.length) return;
  const tbl = wrap.querySelector('.note-table');
  // 현재 상태를 redo에 저장
  const redoStack = _tblRedo.get(wrap) || [];
  if (tbl) redoStack.push({ html: tbl.outerHTML, wrapW: wrap.style.width });
  _tblRedo.set(wrap, redoStack);
  // undo 적용
  const prev = stack.pop();
  _tblUndo.set(wrap, stack);
  applyTblSnapshot(wrap, prev);
}

function tblRedoAction(wrap) {
  const stack = _tblRedo.get(wrap) || [];
  if (!stack.length) return;
  const tbl = wrap.querySelector('.note-table');
  const undoStack = _tblUndo.get(wrap) || [];
  if (tbl) undoStack.push({ html: tbl.outerHTML, wrapW: wrap.style.width });
  _tblUndo.set(wrap, undoStack);
  const next = stack.pop();
  _tblRedo.set(wrap, stack);
  applyTblSnapshot(wrap, next);
}

function applyTblSnapshot(wrap, snap) {
  if (!snap) return;
  const oldTbl = wrap.querySelector('.note-table');
  if (oldTbl) oldTbl.remove();
  const tmp = document.createElement('div');
  tmp.innerHTML = snap.html;
  const newTbl = tmp.querySelector('.note-table') || tmp.firstElementChild;
  if (newTbl) {
    // overlay 앞에 삽입
    const overlay = wrap.querySelector('.col-resize-overlay');
    overlay ? wrap.insertBefore(newTbl, overlay) : wrap.prepend(newTbl);
  }
  if (snap.wrapW) wrap.style.width = snap.wrapW;
  // 이벤트 재연결
  const tbl = wrap.querySelector('.note-table');
  if (tbl) {
    tbl.querySelectorAll('td,th').forEach(c => c._ev = false);
    attachTableEvents(tbl);
  }
  autoSave();
}

// ══════════════════════════════════════════
//  TABLE RESIZE (wrap 전체 너비)
// ══════════════════════════════════════════
function addTableResizeHandle(wrap) {
  wrap.querySelectorAll('.tbl-resize-handle, .tbl-row-resize-handle').forEach(h => h.remove());

  // 가로 크기 핸들 (오른쪽 하단)
  const hHandle = document.createElement('div');
  hHandle.className = 'tbl-resize-handle';
  hHandle.title = '드래그로 표 너비 조절';
  wrap.appendChild(hHandle);
  let startX = 0, startW = 0;
  hHandle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startW = wrap.getBoundingClientRect().width;
    wrap.style.width = startW + 'px';
    document.body.classList.add('tbl-resizing');
    const onMove = me => {
      wrap.style.width = Math.max(120, startW + me.clientX - startX) + 'px';
      const tbl = wrap.querySelector('.note-table');
      if (tbl) rebuildColLines(tbl);
    };
    const onUp = () => {
      document.body.classList.remove('tbl-resizing');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      autoSave();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  // 행별 높이 핸들은 rebuildRowHandles에서 처리
  rebuildRowHandles(wrap);
}

// 각 행 아래에 드래그 핸들을 붙여 행 높이를 독립 조절
function rebuildRowHandles(wrap) {
  wrap.querySelectorAll('.tbl-row-resize-handle').forEach(h => h.remove());
  const tbl = wrap.querySelector('.note-table');
  if (!tbl) return;

  Array.from(tbl.rows).forEach(row => {
    const handle = document.createElement('div');
    handle.className = 'tbl-row-resize-handle';
    handle.title = '드래그로 행 높이 조절';

    let startY = 0, startH = 0;
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      startY = e.clientY;
      startH = row.getBoundingClientRect().height;
      document.body.classList.add('row-resizing');

      const onMove = me => {
        const newH = Math.max(28, startH + me.clientY - startY);
        Array.from(row.cells).forEach(cell => {
          cell.style.height = newH + 'px';
          cell.style.minHeight = newH + 'px';
        });
        // 핸들 위치 갱신
        positionHandle(handle, row);
      };
      const onUp = () => {
        document.body.classList.remove('row-resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        autoSave();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    wrap.appendChild(handle);
    positionHandle(handle, row);
  });

  // 표 크기 변화 시 핸들 위치 재계산
  if (!tbl._rowHandleRO) {
    tbl._rowHandleRO = true;
    if (window.ResizeObserver) {
      new ResizeObserver(() => rebuildRowHandles(wrap)).observe(tbl);
    }
  }
}

function positionHandle(handle, row) {
  const wrapRect = handle.closest('.note-table-wrap')?.getBoundingClientRect();
  const rowRect = row.getBoundingClientRect();
  if (!wrapRect) return;
  const top = rowRect.bottom - wrapRect.top - 4;
  const left = rowRect.left - wrapRect.left;
  handle.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${rowRect.width}px;height:8px;cursor:row-resize;z-index:10;background:transparent;display:flex;align-items:center;justify-content:center;`;
  handle.innerHTML = '<span style="width:40px;height:3px;background:var(--accent);border-radius:3px;opacity:0;transition:opacity 0.15s;display:block"></span>';
  handle.addEventListener('mouseenter', () => handle.querySelector('span').style.opacity='0.7');
  handle.addEventListener('mouseleave', () => { if (!document.body.classList.contains('row-resizing')) handle.querySelector('span').style.opacity='0'; });
}

// ══════════════════════════════════════════
//  TABLE DRAG MOVE + SELECTION + COPY/CUT
// ══════════════════════════════════════════

// 현재 "선택된" 표 (Shift+Arrow 혹은 클릭으로)
let _selectedTableWrap = null;
let _tableCopied = null; // {html, wrapW} for Ctrl+C

function selectTable(wrap) {
  if (_selectedTableWrap && _selectedTableWrap !== wrap) {
    _selectedTableWrap.classList.remove('table-selected');
  }
  _selectedTableWrap = wrap;
  wrap.classList.add('table-selected');
  showTableContextToolbar(wrap);
}
function deselectTable() {
  if (_selectedTableWrap) {
    _selectedTableWrap.classList.remove('table-selected');
    _selectedTableWrap = null;
  }
  hideTableContextToolbar();
}

function showTableContextToolbar(wrap) {
  const toolbar = document.getElementById('table-context-toolbar');
  if (!toolbar) return;
  toolbar.classList.add('visible');
  toolbar._currentWrap = wrap;
}

function hideTableContextToolbar() {
  const toolbar = document.getElementById('table-context-toolbar');
  if (!toolbar) return;
  toolbar.classList.remove('visible');
  toolbar._currentWrap = null;
}

function tblCtxAction(action) {
  const toolbar = document.getElementById('table-context-toolbar');
  const wrap = toolbar?._currentWrap || _selectedTableWrap;
  if (!wrap) { toast('표를 먼저 선택하세요'); return; }

  // tbl* 함수들은 btn 인자로 wrap을 찾으므로 wrap 안의 더미 버튼 전달
  const dummyBtn = wrap.querySelector('td,th') || wrap;
  dummyBtn.closest = dummyBtn.closest || (() => wrap);

  // wrap을 직접 넘기는 방식으로 호출
  switch (action) {
    case 'addRow':    tblAddRowWrap(wrap); break;
    case 'delRow':    tblDelRowWrap(wrap); break;
    case 'addCol':    tblAddColWrap(wrap); break;
    case 'delCol':    tblDelColWrap(wrap); break;
    case 'merge':     tblMergeWrap(wrap); break;
    case 'split':     tblSplitWrap(wrap); break;
    case 'equalRows': tblEqualRowsWrap(wrap); break;
    case 'equalCols': tblEqualColsWrap(wrap); break;
    case 'insertImg': tblInsertImgWrap(wrap); break;
    case 'deleteTable':
      if (confirm('표를 삭제할까요?')) { wrap.remove(); hideTableContextToolbar(); autoSave(); toast('표를 삭제했어요'); }
      break;
  }
}

// wrap을 직접 받는 tbl* 래퍼 함수들
function tblAddRowWrap(wrap) {
  const tbl = wrap.querySelector('.note-table'); if (!tbl) return;
  tblSnapshot(wrap);
  const cols = tbl.rows[0]?.cells.length || 3;
  const tr = document.createElement('tr');
  for (let c = 0; c < cols; c++) { const td = document.createElement('td'); td.contentEditable='true'; tr.appendChild(td); }
  tbl.appendChild(tr); attachTableEvents(tbl); autoSave();

function tblMergeWrap(wrap) {

  tblSnapshot(wrap);

  // 선택된 셀들의 row/col 인덱스 수집
  const positions = cells.map(cell => ({
    cell,
    row: cell.parentElement.rowIndex,
    col: cell.cellIndex
  }));

  const rows = [...new Set(positions.map(p => p.row))].sort((a,b)=>a-b);
  const cols = [...new Set(positions.map(p => p.col))].sort((a,b)=>a-b);

  const isHorizontal = rows.length === 1;   // 같은 행 → 가로 병합
  const isVertical   = cols.length === 1;   // 같은 열 → 세로 병합

  const combined = cells.map(c => c.innerHTML).filter(h => h.trim()).join(' ');
  const first = positions[0].cell;
  first.innerHTML = combined || '';
  first.classList.remove('selected-cell');

  if (isHorizontal) {
    // 가로 병합: colSpan
    first.colSpan = cols.length;
    first.removeAttribute('rowspan');
    for (let i = 1; i < cells.length; i++) cells[i].remove();

  } else if (isVertical) {
    // 세로 병합: rowSpan — 첫 번째 셀에 rowSpan 설정, 나머지 행에서 해당 셀 제거
    first.rowSpan = rows.length;
    first.removeAttribute('colspan');
    for (let i = 1; i < cells.length; i++) cells[i].remove();

  } else {
    // 사각형 범위 병합 (가로 + 세로)
    first.colSpan = cols.length;
    first.rowSpan = rows.length;
    for (let i = 1; i < cells.length; i++) cells[i].remove();
  }

  _selCells = [];
  if (tbl) rebuildColLines(tbl);
  autoSave(); toast('병합됐어요!');
}

// 표 드래그 핸들에 이벤트 연결
function attachTableDragHandle(handle, wrap) {
  handle.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();

    selectTable(wrap);
    document.body.classList.add('tbl-dragging');

    // 드롭 인디케이터 엘리먼트 (재사용)
    let indicator = document.getElementById('_tbl_drop_ind');
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.id = '_tbl_drop_ind';
      indicator.className = 'tbl-drop-indicator';
      document.body.appendChild(indicator);
    }
    indicator.style.display = 'none';

    // 커서 근처 삽입 위치 찾기
    let dropTarget = null; // { parent, before: Element|null }

    const onMove = ev => {
      const x = ev.clientX, y = ev.clientY;
      // 표 wrap이 속한 editor body
      const body = wrap.parentElement;
      if (!body) return;

      // body 안의 형제 요소들 중 삽입할 위치 탐색
      const siblings = Array.from(body.children).filter(el => el !== wrap);
      let best = null, bestDist = Infinity;

      for (const sib of siblings) {
        const r = sib.getBoundingClientRect();
        const midY = (r.top + r.bottom) / 2;
        // 위쪽 경계
        const distTop = Math.abs(r.top - y);
        const distBot = Math.abs(r.bottom - y);
        if (distTop < bestDist) { bestDist = distTop; best = { before: sib }; }
        if (distBot < bestDist) { bestDist = distBot; best = { before: sib.nextElementSibling }; }
      }
      // body 끝
      const bodyR = body.getBoundingClientRect();
      if (Math.abs(bodyR.bottom - y) < bestDist) best = { before: null };

      dropTarget = best ? { parent: body, before: best.before } : null;

      // 인디케이터 위치
      if (dropTarget) {
        const ref = dropTarget.before;
        let indY;
        if (ref) {
          const rr = ref.getBoundingClientRect();
          indY = rr.top + window.scrollY - 2;
          indicator.style.width = rr.width + 'px';
          indicator.style.left = rr.left + 'px';
        } else {
          const last = body.lastElementChild;
          if (last && last !== wrap) {
            const rr = last.getBoundingClientRect();
            indY = rr.bottom + window.scrollY + 2;
            indicator.style.width = rr.width + 'px';
            indicator.style.left = rr.left + 'px';
          }
        }
        indicator.style.top = (indY || 0) + 'px';
        indicator.style.position = 'absolute';
        indicator.style.display = 'block';
      }
    };

    const onUp = ev => {
      document.body.classList.remove('tbl-dragging');
      indicator.style.display = 'none';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);

      if (dropTarget) {
        const { parent, before } = dropTarget;
        if (before && before !== wrap && before !== wrap.nextElementSibling) {
          parent.insertBefore(wrap, before);
        } else if (!before) {
          parent.appendChild(wrap);
        }
        // wrap 뒤에 빈 p 보장
        if (!wrap.nextElementSibling || wrap.nextElementSibling.classList?.contains('note-table-wrap')) {
          const p = document.createElement('p'); p.innerHTML = '<br>';
          wrap.after(p);
        }
        autoSave();
        toast('표를 이동했어요');
      }
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// Shift+ArrowUp/Down으로 표 선택 (커서가 표 바로 앞/뒤에 있을 때)
// → 키보드 이벤트 섹션에서 처리 (아래 keydown listener에 통합)

// Ctrl+C / Ctrl+X 표 복사/잘라내기
document.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;

  // 선택된 표가 있을 때 C/X
  if (_selectedTableWrap) {
    if (e.key === 'c') {
      e.preventDefault();
      _tableCopied = {
        html: _selectedTableWrap.outerHTML,
        type: 'table'
      };
      toast('표를 복사했어요 📋');
      return;
    }
    if (e.key === 'x') {
      e.preventDefault();
      _tableCopied = {
        html: _selectedTableWrap.outerHTML,
        type: 'table'
      };
      const next = _selectedTableWrap.nextElementSibling;
      const prev = _selectedTableWrap.previousElementSibling;
      _selectedTableWrap.remove();
      _selectedTableWrap = null;
      // 커서를 앞 혹은 뒤 요소로
      const target = next || prev;
      if (target && target.isContentEditable) {
        target.focus(); placeCursorAtEnd(target);
      } else if (target) {
        const ed = target.querySelector?.('[contenteditable]');
        if (ed) { ed.focus(); placeCursorAtEnd(ed); }
      }
      autoSave();
      toast('표를 잘라냈어요 ✂️');
      return;
    }
    if (e.key === 'v' && _tableCopied?.type === 'table') {
      // 선택 표 있을 때 V → 그 뒤에 붙여넣기
      e.preventDefault();
      const tmp = document.createElement('div');
      tmp.innerHTML = _tableCopied.html;
      const newWrap = tmp.firstElementChild;
      if (newWrap) {
        _selectedTableWrap.after(newWrap);
        // 이벤트 재연결
        const newTbl = newWrap.querySelector('.note-table');
        if (newTbl) { newTbl.querySelectorAll('td,th').forEach(c=>c._ev=false); attachTableEvents(newTbl); }
        addTableResizeHandle(newWrap);
        const dh = document.createElement('div');
        dh.className='tbl-drag-handle'; dh.innerHTML='⠿ 표 이동'; dh.contentEditable='false';
        newWrap.appendChild(dh); attachTableDragHandle(dh, newWrap);
        autoSave(); toast('표를 붙여넣었어요!');
      }
      return;
    }
  }

  // 일반 Ctrl+V에서 표 붙여넣기 (커서 위치)
  if (e.key === 'v' && _tableCopied?.type === 'table') {
    const active = document.activeElement;
    const inEditor = document.getElementById('editor-body')?.contains(active);
    const inCell = active && (active.nodeName === 'TD' || active.nodeName === 'TH');
    if (inEditor && !inCell) {
      e.preventDefault();
      const tmp = document.createElement('div');
      tmp.innerHTML = _tableCopied.html;
      const newWrap = tmp.firstElementChild;
      if (newWrap) {
        // 커서 위치 뒤에 삽입
        const sel = window.getSelection();
        let insertAfter = null;
        if (sel && sel.rangeCount > 0) {
          let node = sel.getRangeAt(0).commonAncestorContainer;
          while (node && node !== active) {
            if (node.parentNode === active) { insertAfter = node; break; }
            node = node.parentNode;
          }
        }
        if (insertAfter) { insertAfter.after(newWrap); }
        else { active.appendChild(newWrap); }
        const p = document.createElement('p'); p.innerHTML = '<br>';
        newWrap.after(p);
        const newTbl = newWrap.querySelector('.note-table');
        if (newTbl) { newTbl.querySelectorAll('td,th').forEach(c=>c._ev=false); attachTableEvents(newTbl); }
        addTableResizeHandle(newWrap);
        const dh = document.createElement('div');
        dh.className='tbl-drag-handle'; dh.innerHTML='⠿ 표 이동'; dh.contentEditable='false';
        newWrap.appendChild(dh); attachTableDragHandle(dh, newWrap);
        autoSave(); toast('표를 붙여넣었어요!');
      }
      return;
    }
  }
});

// 에디터 클릭 시 표 선택 해제 (표 바깥 클릭)

// 표 클릭으로 선택 (셀 안 편집과 구분: 표 wrap 자체 클릭)
// → attachTableEvents에서 셀 클릭 시 Shift키 확인



function attachTableEvents(tbl) {
  rebuildColLines(tbl);

  tbl.querySelectorAll('td,th').forEach(cell => {
    if (cell._ev) return; cell._ev = true;

    cell.addEventListener('mousedown', e => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        cell.classList.toggle('selected-cell');
        if (cell.classList.contains('selected-cell')) {
          if (!_selCells.includes(cell)) _selCells.push(cell);
        } else {
          _selCells = _selCells.filter(c => c !== cell);
        }
      } else {
        // 같은 표 안 클릭이면 선택 유지, 다른 표거나 표 밖이면 해제
        const clickedTable = tbl;
        const hasForeignSel = _selCells.some(c => !clickedTable.contains(c));
        if (hasForeignSel) {
          _selCells.forEach(c => c.classList.remove('selected-cell'));
          _selCells = [];
        }
        // 같은 표 내 일반 클릭은 선택 유지 (Ctrl 없이도 이미 선택된 셀은 그대로)
      }
    });

    cell.addEventListener('input', autoSave);
    cell.addEventListener('focus', () => {
      _lastFocusedCell = cell;
      showTableContextToolbar(tbl.closest('.note-table-wrap'));
    });

    const trackSel = () => {
      const s = window.getSelection();
      if (s && s.rangeCount > 0) _savedRange = s.getRangeAt(0).cloneRange();
    };
    cell.addEventListener('mouseup', trackSel);
    cell.addEventListener('keyup', trackSel);
    cell.addEventListener('focus', trackSel);

    cell.addEventListener('keydown', e => {
      const rowIdx = cell.parentElement.rowIndex;
      const colIdx = cell.cellIndex;
      const rows = tbl.rows;
      const colCnt = cell.parentElement.cells.length;

      if (e.key === 'Enter' && !e.shiftKey) { e.stopPropagation(); return; }

      if (e.key === 'Tab') {
        e.preventDefault();
        const ni = e.shiftKey ? colIdx - 1 : colIdx + 1;
        if (ni >= 0 && ni < colCnt) { rows[rowIdx].cells[ni].focus(); placeCursorAtEnd(rows[rowIdx].cells[ni]); }
        else if (!e.shiftKey && rowIdx < rows.length - 1) { rows[rowIdx+1].cells[0].focus(); placeCursorAtEnd(rows[rowIdx+1].cells[0]); }
        else if (e.shiftKey && rowIdx > 0) { rows[rowIdx-1].cells[colCnt-1].focus(); placeCursorAtEnd(rows[rowIdx-1].cells[colCnt-1]); }
        return;
      }
      if (e.key === 'ArrowUp' && rowIdx > 0 && isCursorAtFirstLine(cell)) {
        e.preventDefault();
        const t = rows[rowIdx-1].cells[Math.min(colIdx, rows[rowIdx-1].cells.length-1)];
        t.focus(); placeCursorAtEnd(t); return;
      }
      if (e.key === 'ArrowDown' && rowIdx < rows.length - 1) {
        if (cell.offsetHeight <= 40 || isCursorAtLastLine(cell)) {
          e.preventDefault();
          const t = rows[rowIdx+1].cells[Math.min(colIdx, rows[rowIdx+1].cells.length-1)];
          t.focus(); placeCursorAtEnd(t);
        }
        return;
      }
      if (e.key === 'ArrowRight') {
        const isLast = rowIdx === rows.length-1 && colIdx === colCnt-1;
        if (isLast && isCursorAtTextEnd(cell)) {
          e.preventDefault();
          const wrap = tbl.closest('.note-table-wrap');
          const next = wrap && wrap.nextElementSibling;
          if (next) { const ed = next.querySelector('[contenteditable="true"]'); if (ed) { ed.focus(); placeCursorAtStart(ed); } }
        }
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        tblUndoAction(tbl.closest('.note-table-wrap'));
        return;
      }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
        e.preventDefault();
        tblRedoAction(tbl.closest('.note-table-wrap'));
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
        e.preventDefault();
        const sel2 = window.getSelection(), r2 = document.createRange();
        if (sel2 && sel2.rangeCount > 0 && sel2.getRangeAt(0).toString() === cell.textContent) {
          r2.selectNodeContents(document.getElementById('editor-body') || document.querySelector('.editor-page [contenteditable]'));
        } else { r2.selectNodeContents(cell); }
        sel2.removeAllRanges(); sel2.addRange(r2); return;
      }
    });
  });
}

// 열 경계선 핸들 재생성 — td 테두리 위에 직접 올리는 방식
function rebuildColLines(tbl) {
  const wrap = tbl.closest('.note-table-wrap');
  if (!wrap) return;

  // 기존 오버레이 제거 후 재생성
  wrap.querySelectorAll('.col-resize-overlay').forEach(el => el.remove());

  const overlay = document.createElement('div');
  overlay.className = 'col-resize-overlay';
  // wrap 기준 절대 위치
  overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:4;';
  wrap.appendChild(overlay);

  const firstRow = tbl.rows[0];
  if (!firstRow) return;

  // colgroup 보장
  let colgroup = tbl.querySelector('colgroup');
  if (!colgroup) {
    colgroup = document.createElement('colgroup');
    const totalW = tbl.offsetWidth || 1;
    Array.from(firstRow.cells).forEach(cell => {
      const col = document.createElement('col');
      col.style.width = (cell.offsetWidth / totalW * 100).toFixed(2) + '%';
      colgroup.appendChild(col);
    });
    tbl.prepend(colgroup);
  }
  const cols = Array.from(colgroup.querySelectorAll('col'));

  // tbl의 wrap 내 상대 위치
  const tblLeft = tbl.offsetLeft;
  let cumX = tblLeft;

  Array.from(firstRow.cells).forEach((cell, ci) => {
    cumX += cell.offsetWidth;
    if (ci === firstRow.cells.length - 1) return;

    const line = document.createElement('div');
    line.className = 'col-resize-line';
    line.style.cssText = `position:absolute;top:0;left:${cumX - 3}px;width:6px;height:${tbl.offsetHeight}px;cursor:col-resize;pointer-events:all;background:transparent;transition:background 0.12s;z-index:5;`;

    let startX = 0, startW = 0, nextW = 0;
    const totalW = tbl.offsetWidth;

    line.addEventListener('mouseenter', () => { line.style.background = 'rgba(233,69,96,0.35)'; });
    line.addEventListener('mouseleave', () => { if (!line._dragging) line.style.background = 'transparent'; });

    line.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      line._dragging = true;
      startX = e.clientX;
      startW = cell.offsetWidth;
      nextW = firstRow.cells[ci+1] ? firstRow.cells[ci+1].offsetWidth : 0;
      line.style.background = 'rgba(233,69,96,0.5)';
      document.body.classList.add('col-resizing');

      const onMove = me => {
        const dx = me.clientX - startX;
        const nw = Math.max(40, startW + dx);
        const nnw = Math.max(40, nextW - dx);
        if (cols[ci]) cols[ci].style.width = (nw / totalW * 100).toFixed(2) + '%';
        if (cols[ci+1]) cols[ci+1].style.width = (nnw / totalW * 100).toFixed(2) + '%';
      };
      const onUp = () => {
        line._dragging = false;
        line.style.background = 'transparent';
        document.body.classList.remove('col-resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        rebuildColLines(tbl);
        autoSave();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    overlay.appendChild(line);
  });

  // 표 높이 변할 때 핸들 높이 갱신
  if (!tbl._roAttached) {
    tbl._roAttached = true;
    if (window.ResizeObserver) {
      new ResizeObserver(() => rebuildColLines(tbl)).observe(tbl);
    }
  }
}

const PAGE_H = 1123;
const PAGE_PAD_Y = 52;
const PAGE_PAD_X = 60;
const PAGE_CONTENT_H = PAGE_H - PAGE_PAD_Y * 2;

function updatePageBreakLabels() {
  const body = document.getElementById('editor-body');
  const labels = document.getElementById('page-break-labels');
  if (!body || !labels) return;
  labels.innerHTML = '';
  const totalH = body.scrollHeight;
  const totalPages = Math.max(1, Math.ceil(totalH / PAGE_CONTENT_H));
  for (let i = 1; i < totalPages; i++) {
    const lbl = document.createElement('div');
    lbl.className = 'page-break-label';
    lbl.style.top = (PAGE_PAD_Y + i * PAGE_CONTENT_H - 8) + 'px';
    lbl.textContent = `— ${i+1}페이지 —`;
    labels.appendChild(lbl);
  }
  const ind = document.getElementById('page-indicator');
  const scroll = document.getElementById('editor-scroll');
  if (ind && scroll) {
    const cur = Math.min(totalPages, Math.floor(scroll.scrollTop / PAGE_H) + 1);
    ind.textContent = `${cur} / ${totalPages} 페이지`;
  }
}

function getAllHtml() {
  const body = document.getElementById('editor-body');
  if (!body) return '';
  const clone = body.cloneNode(true);
  clone.querySelectorAll('.tbl-drag-handle,.tbl-resize-handle,.tbl-row-resize-handle,.col-resize-overlay,.table-toolbar,.tbl-drop-line').forEach(el => el.remove());
  clone.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
  clone.querySelectorAll('.note-table-wrap').forEach(w => w.removeAttribute('contenteditable'));
  clone.querySelectorAll('td, th').forEach(cell => {
    if (cell.children.length === 1 && cell.firstElementChild.tagName === 'DIV' && !cell.firstElementChild.className && !cell.firstElementChild.id) {
      cell.innerHTML = cell.firstElementChild.innerHTML;
    }
  });
  return clone.innerHTML;
}

function restoreBodyHtml(html) {
  const body = document.getElementById('editor-body');
  if (!body) return;
  let h = html || '';
  h = h.replace(/<hr[^>]*class="page-break"[^>]*>/gi, '<p><br></p>');
  body.innerHTML = h;
  body.querySelectorAll('.tbl-drag-handle,.tbl-resize-handle,.tbl-row-resize-handle,.col-resize-overlay,.table-toolbar,.tbl-drop-line').forEach(el => el.remove());
  body.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
  body.querySelectorAll('.note-table').forEach(tbl => {
    tbl.querySelectorAll('.col-resize-overlay').forEach(h => h.remove());
    tbl.querySelectorAll('td,th').forEach(c => c._ev = false);
    attachTableEvents(tbl);
  });
  body.querySelectorAll('.note-table-wrap').forEach(wrap => addTableResizeHandle(wrap));
  updatePageBreakLabels();
}

function onEditorInput(e) {
  const body = e.target;
  body.querySelectorAll('ol:not(.note-ol)').forEach(ol => ol.classList.add('note-ol'));
  body.querySelectorAll('ul:not(.note-ul)').forEach(ul => ul.classList.add('note-ul'));
  body.querySelectorAll('h1:not(.note-h1)').forEach(h => h.classList.add('note-h1'));
  body.querySelectorAll('h2:not(.note-h2)').forEach(h => h.classList.add('note-h2'));
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    const node = range.startContainer;
    if (node.nodeType === Node.TEXT_NODE) {
      const offset = range.startOffset;
      const text = node.textContent;
      const newText = text.replace(/<&>/g,'↔').replace(/->/g,'→').replace(/<-/g,'←');
      if (newText !== text) {
        node.textContent = newText;
        try {
          const diff = text.length - newText.length;
          const nr = document.createRange();
          nr.setStart(node, Math.max(0, Math.min(offset-diff, newText.length)));
          nr.collapse(true);
          sel.removeAllRanges(); sel.addRange(nr);
        } catch(err) {}
      }
    }
  }
  updatePageBreakLabels();
  autoSave();
}

function makePaperClone() {
  const paper = document.getElementById('editor-paper');
  const clone = paper.cloneNode(true);
  clone.style.cssText = `width:794px;background:#fff;padding:${PAGE_PAD_Y}px ${PAGE_PAD_X}px;box-sizing:border-box;background-image:none;`;
  clone.querySelectorAll('.tbl-drag-handle,.tbl-resize-handle,.tbl-row-resize-handle,.col-resize-overlay,.table-toolbar,.tbl-drop-line,#page-break-labels').forEach(el => el.remove());
  clone.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  clone.querySelectorAll('td,th').forEach(cell => {
    const bg = cell.style.backgroundColor;
    if (bg && bg !== 'transparent') cell.style.background = bg;
  });
  clone.querySelectorAll('mark').forEach(m => { m.style.background = m.style.backgroundColor || '#fff176'; });
  return clone;
}

// 페이지별 클립 캡처 — 각 페이지를 정확히 794×PAGE_H 컨테이너로 잘라 캡처
async function captureByPage(sourceEl, pdf, isFirst) {
  const pW = pdf.internal.pageSize.getWidth();   // ≈793.70
  const pH = pdf.internal.pageSize.getHeight();  // ≈1122.52

  // PAGE_H를 jsPDF 실제 치수 기반으로 계산 (CSS 794px → PDF pW)
  // 1px(CSS) = pW/794 pt(PDF), 소수 오차 최소화
  const PAGE_H_CSS = Math.round(pH * 794 / pW);  // ≈1123

  // 먼저 소스 엘리먼트를 DOM에 붙여서 실제 높이 측정
  const measurer = sourceEl.cloneNode(true);
  measurer.style.cssText = [
    'position:fixed','left:-9999px','top:0','z-index:-1',
    'width:794px','background:#fff','visibility:hidden'
  ].join(';');
  document.body.appendChild(measurer);
  await new Promise(r => setTimeout(r, 100));
  const totalH = measurer.scrollHeight;
  document.body.removeChild(measurer);

  const totalPages = Math.ceil(totalH / PAGE_H_CSS);

  for (let i = 0; i < totalPages; i++) {
    // 클리퍼: 정확히 한 A4 페이지 크기
    const clipper = document.createElement('div');
    clipper.style.cssText = [
      'position:fixed','left:-9999px','top:0','z-index:-1',
      'width:794px',`height:${PAGE_H_CSS}px`,
      'overflow:hidden','background:#fff'
    ].join(';');

    // 콘텐츠: margin-top으로 해당 페이지 구간만 보이게
    const inner = sourceEl.cloneNode(true);
    inner.style.cssText = [
      'width:794px',
      `margin-top:${-i * PAGE_H_CSS}px`,
      'background:#fff','background-image:none'
    ].join(';');

    clipper.appendChild(inner);
    document.body.appendChild(clipper);
    await new Promise(r => setTimeout(r, 80));

    const canvas = await html2canvas(clipper, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff',
      width: 794, height: PAGE_H_CSS,
      windowWidth: 794, logging: false
    });
    document.body.removeChild(clipper);

    if (!isFirst || i > 0) pdf.addPage();
    // 캔버스를 정확히 PDF 한 페이지 크기로 삽입
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pW, pH);
  }
}

async function savePDF() {
  const ld = document.getElementById('exam-loading'), msg = document.getElementById('exam-loading-msg');
  ld.classList.add('show'); msg.textContent = '📄 PDF 생성 중...';

// 백틱(`텍스트`) → 밑줄 빈칸 + 번호로 변환
function applyBlankTransform(rootEl, answers, idxRef) {
  const root = rootEl.nodeType === Node.DOCUMENT_NODE ? rootEl.body : rootEl;
  if (!root) return;
  const textNodes = [];
  function collect(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      if (node.textContent.includes('`')) textNodes.push(node);
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === 'SCRIPT' || node.tagName === 'STYLE') return;
      Array.from(node.childNodes).forEach(collect);
    }
  }
  collect(root);
  textNodes.forEach(node => {
    if (!node.parentNode) return;
    const span = document.createElement('span');
    span.innerHTML = node.textContent.replace(/`([^`]+)`/g, (_, inner) => {
      idxRef.idx++;
      answers.push({ num: idxRef.idx, answer: inner });
      const w = Math.max(60, inner.length * 9);
      return `<span style="display:inline-block;border-bottom:2px solid #333;min-width:${w}px;margin:0 3px;position:relative;vertical-align:bottom;"><sup style="font-size:9px;color:#aaa;position:absolute;top:-2px;left:1px;">${idxRef.idx}</sup></span>`;
    });
    node.parentNode.replaceChild(span, node);
  });
}

function makeExam() {
  const note = state.notes.find(n => n.id === state.currentNoteId);
  if (!note) return;
  buildAndSaveExamPDF(getAllHtml(), note.title || '시험지');
}

function makeSubjectExam() {
  const subId = state.filterSubject;
  if (subId === 'all') { toast('과목을 선택하세요'); return; }
  const sub = state.subjects.find(s => s.id === subId);
  const notes = state.notes.filter(n => n.subject === subId);
  if (!notes.length) { toast('이 과목에 노트가 없어요'); return; }
  const combined = notes.map(n => n.html||'').join('<p><br></p>');
  buildAndSaveExamPDF(combined, (sub?.name||'과목')+'_시험지');
}

async function buildAndSaveExamPDF(html, filename) {
  const ld = document.getElementById('exam-loading'), msg = document.getElementById('exam-loading-msg');
  ld.classList.add('show');
  try {
    await new Promise(r => setTimeout(r, 50));
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF({orientation:'p', unit:'px', format:'a4'});
    const answers = [], idxRef = {idx:0};

    msg.textContent = '📄 시험지 준비 중...';

    // editor-paper와 완전히 동일한 클론 사용 (렌더링 일치 보장)
    const clone = makePaperClone();

    // 클론 안의 editor-body 내용을 exam html로 교체
    const bodyEl = clone.querySelector('#editor-body') || clone.querySelector('[contenteditable]') || clone;
    if (bodyEl !== clone) {
      bodyEl.innerHTML = html;
      bodyEl.removeAttribute('contenteditable');
    }

    // 백틱 → 밑줄 빈칸 변환
    applyBlankTransform(clone, answers, idxRef);

    await captureByPage(clone, pdf, true);

    // 정답지
    if (answers.length > 0) {
      msg.textContent = '📄 정답지 생성 중...';
      const ansPages = buildAnswerPages(filename, answers, 794, PAGE_H);
      for (const ansDiv of ansPages) {
        await captureByPage(ansDiv, pdf, false);
      }
    }

    pdf.save(filename.replace(/[\/\\?%*:|"<>]/g,'-')+'_시험지.pdf');
    toast('✅ 시험지 PDF 저장됐어요!');
  } catch(err) { toast('PDF 오류: '+err.message); console.error(err); }
  ld.classList.remove('show');
}

function buildAnswerPages(title, answers, A4_W, A4_H) {
  const PAD_X = 60, PAD_Y = 52;
  const ROW_H = 32; // 정답 행 하나의 예상 높이
  const HEADER_H = 100;
  const maxRows = Math.floor((A4_H - PAD_Y * 2 - HEADER_H) / ROW_H);

  const pages = [];
  for (let start = 0; start < answers.length; start += maxRows) {
    const chunk = answers.slice(start, start + maxRows);
    const isFirst = start === 0;
    const div = document.createElement('div');
    div.style.cssText = [
      `width:794px`,
      `box-sizing:border-box`, `padding:${PAD_Y}px ${PAD_X}px`,
      `background:#fff`, `font-family:'Nanum Gothic',sans-serif`,
      `font-size:13px`, `line-height:1.7`, `color:#2d2d2d`
    ].join(';');

    const headerHTML = isFirst ? `
      <div style="text-align:center;margin-bottom:18px;border-bottom:2px solid #333;padding-bottom:10px;">
        <div style="font-size:17px;font-weight:800;margin-bottom:3px">📋 ${title} — 정답</div>
      </div>` : `
      <div style="margin-bottom:14px;border-bottom:1px solid #ccc;padding-bottom:6px;font-size:12px;color:#999">${title} — 정답 (이어서)</div>`;

    const rows = chunk.map(a =>
      `<tr>
        <td style="padding:5px 14px;border:1px solid #ddd;text-align:center;font-weight:700;color:#555;width:52px">${a.num}</td>
        <td style="padding:5px 14px;border:1px solid #ddd">${a.answer}</td>
      </tr>`
    ).join('');

    div.innerHTML = `${headerHTML}
      <table style="border-collapse:collapse;width:100%;font-size:13px;">
        <thead><tr style="background:#f5f5f5;">
          <th style="padding:6px 14px;border:1px solid #ddd;width:52px;">번호</th>
          <th style="padding:6px 14px;border:1px solid #ddd;text-align:left;">정답</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    pages.push(div);
  }
  return pages;
}

// html2canvas 캡처 전 clone에서 스타일 강제 적용

function prepareForCapture(sourceEl) {
  const clone = sourceEl.cloneNode(true);
  clone.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;background:#fff;';
  // contenteditable 제거 (html2canvas가 더 안정적으로 렌더)
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  // 셀 backgroundColor → background 속성으로 병기
  clone.querySelectorAll('td, th').forEach(cell => {
    const bg = cell.style.backgroundColor;
    if (bg && bg !== 'transparent' && bg !== '') {
      cell.style.background = bg;
      cell.setAttribute('bgcolor', bg); // 레거시 fallback
    }
  });
  // mark 태그 배경도 강제
  clone.querySelectorAll('mark').forEach(mark => {
    const bg = mark.style.backgroundColor || '#fff176';
    mark.style.background = bg;
    mark.style.webkitPrintColorAdjust = 'exact';
  });
  // selected-cell 하이라이트 제거
  clone.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
  // 툴바/핸들 제거
  clone.querySelectorAll('.table-toolbar, .col-resize-overlay, .tbl-resize-handle').forEach(el => el.remove());
  document.body.appendChild(clone);
  return clone;
}

function placeCursorAtEnd(el) { try{const r=document.createRange(),s=window.getSelection();r.selectNodeContents(el);r.collapse(false);s.removeAllRanges();s.addRange(r);}catch(e){} }
function placeCursorAtStart(el) { try{const r=document.createRange(),s=window.getSelection();r.setStart(el,0);r.collapse(true);s.removeAllRanges();s.addRange(r);}catch(e){} }
function isCursorAtFirstLine(cell) { const sel=window.getSelection();if(!sel||!sel.rangeCount)return true;const r=sel.getRangeAt(0),cr=cell.getBoundingClientRect(),rr=r.getBoundingClientRect();return rr.height===0||rr.top<=cr.top+6; }
function isCursorAtLastLine(cell) { const sel=window.getSelection();if(!sel||!sel.rangeCount)return true;const r=sel.getRangeAt(0),cr=cell.getBoundingClientRect(),rr=r.getBoundingClientRect();return rr.height===0||rr.bottom>=cr.bottom-6; }
